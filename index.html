<script>
  // Firebase config
  const firebaseConfig = { apiKey: "AIzaSyAmgvzZju_GbPdUDDHqFg4AN54xnJ4LwW8", authDomain: "whispers-4d04e.firebaseapp.com", projectId: "whispers-4d04e", storageBucket: "whispers-4d04e.firebasestorage.app", messagingSenderId: "32971948813", appId: "1:32971948813:web:3ea4e8a242c055a7e52644", measurementId: "G-K4N3XEBZKK" };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth(), db = firebase.firestore(), storage = firebase.storage();
  let currentUser = null, currentUserData = null, currentChat = { type: null, id: null }, messagesUnsub = null, typingTimeout = null, typingUnsub = null;
  let chatsUnsubPrivate = null, chatsUnsubGroups = null;
  let isRendering = false;

  function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
  function isMobile() { return window.innerWidth <= 768; }
  function formatMessageTime(timestamp) { if (!timestamp) return ''; const date = timestamp.toDate(); const now = new Date(); const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()); const isToday = date >= todayMidnight; const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); if (isToday) return timeStr; return `${date.getMonth()+1}/${date.getDate()} ${timeStr}`; }
  function showChatListView() { document.body.classList.remove('mobile-chat-active'); if(messagesUnsub) messagesUnsub(); if(typingUnsub) typingUnsub(); currentChat = { type: null, id: null }; const header = document.getElementById('desktopChatHeader'); if(header) header.innerHTML = 'Select a chat'; const membersBtn = document.getElementById('membersBtn'); if(membersBtn) membersBtn.style.display = 'none'; const messagesDiv = document.getElementById('desktopChatMessages'); if(messagesDiv) messagesDiv.innerHTML = '<div class="welcome-placeholder"><i class="fas fa-comment-dots"></i><p>Pick a conversation</p></div>'; const typingSpan = document.getElementById('typingIndicator'); if(typingSpan) typingSpan.innerText = ''; }
  function showChatView() { if(isMobile()) document.body.classList.add('mobile-chat-active'); }

  async function updateUserProfile(displayName, avatarURL) { if(!currentUser) return; const updates = {}; if(displayName !== undefined) updates.displayName = displayName; if(avatarURL !== undefined) updates.avatarURL = avatarURL; if(Object.keys(updates).length) await db.collection("users").doc(currentUser.uid).update(updates); if(displayName && displayName !== currentUser.displayName) await currentUser.updateProfile({ displayName }); currentUserData = { ...currentUserData, ...updates }; renderProfileAvatar(); renderChatList(); }
  function renderProfileAvatar() { const container = document.getElementById('desktopProfileAvatar'); if(!container) return; if(currentUser){ const avatarUrl = currentUserData?.avatarURL; const initial = (currentUserData?.displayName || currentUser?.email || 'U').charAt(0).toUpperCase(); container.innerHTML = avatarUrl ? `<img src="${avatarUrl}" class="profile-avatar">` : `<div class="profile-avatar-placeholder">${initial}</div>`; const avatarDiv = container.firstChild; if(avatarDiv) avatarDiv.addEventListener('click', () => showUserProfile(currentUser.uid)); } else { container.innerHTML = '<div class="profile-avatar-placeholder"><i class="fas fa-user"></i></div>'; } }
  async function showUserProfile(userId) { const userDoc = await db.collection("users").doc(userId).get(); if(!userDoc.exists) { await alert("User not found"); return; } const data = userDoc.data(); const modal = document.getElementById('profileModal'); if(!modal) return; const content = document.getElementById('profileViewContent'); if(content) content.innerHTML = `<img src="${data.avatarURL || 'https://cdn.jsdelivr.net/gh/alohe/memojis/png/teams_5.png'}" class="profile-avatar-large" style="width:100px; height:100px; border-radius:50%;"><h3>${escapeHtml(data.displayName || userId)}</h3><p style="color:#6b7b8c;">${escapeHtml(data.email || '')}</p>${userId !== currentUser.uid ? `<button id="startChatFromProfileBtn" class="game-btn" style="margin-top:8px;"><i class="fas fa-comment"></i> Send Message</button>` : ''}`;
    modal.style.display = 'flex'; if(userId !== currentUser.uid) { const chatBtn = document.getElementById('startChatFromProfileBtn'); if(chatBtn) chatBtn.onclick = async () => { modal.style.display = 'none'; await startPrivateChat(userId); await renderChatList(); await openChat('private', userId); }; } }
  async function ensureUserDocument(user) { const userRef = db.collection("users").doc(user.uid); const snap = await userRef.get(); if(!snap.exists){ await userRef.set({ displayName: user.displayName || user.email, email: user.email, online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp(), avatarURL: null }); currentUserData = { displayName: user.displayName || user.email, email: user.email, avatarURL: null }; } else { currentUserData = snap.data(); await userRef.update({ online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }); } renderProfileAvatar(); }

  async function updateUnreadCount(chatType, chatId, members, excludeUserId) {
    if (currentChat && currentChat.type === chatType && currentChat.id === chatId) return;
    const inc = firebase.firestore.FieldValue.increment(1);
    const data = {};
    for(let uid of members) if(uid !== excludeUserId) data[`unreadCounts.${uid}`] = inc;
    if(chatType === 'group') await db.collection("groups").doc(chatId).update(data).catch(()=>{});
    else { const ids=[currentUser.uid, chatId].sort(); await db.collection("privateMessages").doc(ids.join('_')).update(data).catch(()=>{}); }
  }
  async function resetUnreadCount(chatType, chatId) { if(!currentUser) return; if(chatType === 'group') await db.collection("groups").doc(chatId).update({ [`unreadCounts.${currentUser.uid}`]: 0 }).catch(()=>{}); else { const ids=[currentUser.uid, chatId].sort(); await db.collection("privateMessages").doc(ids.join('_')).update({ [`unreadCounts.${currentUser.uid}`]: 0 }).catch(()=>{}); } }
  async function updateLastMessage(chatType, chatId, messageText, senderName) { const preview = messageText.length > 40 ? messageText.substring(0,40)+'…' : messageText; const timestamp = firebase.firestore.FieldValue.serverTimestamp(); if(chatType === 'group') await db.collection("groups").doc(chatId).update({ lastMessage: preview, lastMessageTime: timestamp, lastSender: senderName }).catch(()=>{}); else { const otherId = chatId; await db.collection("privateChats").doc(currentUser.uid).set({ [otherId]: { lastMessage: preview, lastMessageTime: timestamp, lastSender: senderName } }, { merge: true }); await db.collection("privateChats").doc(otherId).set({ [currentUser.uid]: { lastMessage: preview, lastMessageTime: timestamp, lastSender: senderName } }, { merge: true }); } }
  function subscribeToChatList() { if (chatsUnsubPrivate) chatsUnsubPrivate(); if (chatsUnsubGroups) chatsUnsubGroups(); if (!currentUser) return; chatsUnsubPrivate = db.collection("privateChats").doc(currentUser.uid).onSnapshot(() => renderChatList(), err => console.warn(err)); chatsUnsubGroups = db.collection("groups").where("members", "array-contains", currentUser.uid).onSnapshot(() => renderChatList(), err => console.warn(err)); }

  async function sendMessage(text, attachments) { 
    if(!currentChat.id || !currentUser) return; 
    if(!text.trim() && (!attachments || attachments.length===0)) return; 
    const msgText = text.trim(); 
    const msg = { 
      text: msgText, 
      senderId: currentUser.uid, 
      senderName: currentUserData?.displayName || currentUser.email, 
      timestamp: firebase.firestore.FieldValue.serverTimestamp(), 
      attachments: attachments || [],
      status: 'sent'
    }; 
    let members = []; 
    if(currentChat.type === 'group') { 
      const groupSnap = await db.collection("groups").doc(currentChat.id).get(); 
      members = groupSnap.data()?.members || []; 
      await db.collection("groups").doc(currentChat.id).collection("messages").add(msg); 
    } else { 
      const ids = [currentUser.uid, currentChat.id].sort(); 
      const convId = ids.join('_'); 
      await db.collection("privateMessages").doc(convId).collection("messages").add(msg); 
      members = [currentUser.uid, currentChat.id]; 
    } 
    const previewText = msgText || (attachments && attachments[0]?.name) || '📎 Attachment';
    await updateLastMessage(currentChat.type, currentChat.id, previewText, msg.senderName);
    await updateUnreadCount(currentChat.type, currentChat.id, members, currentUser.uid);
    const inputField = document.getElementById('desktopMessageInput');
    if(inputField) inputField.value = '';
  }

  async function updateMessageStatus(chatType, chatId, messageId, newStatus) {
    if(chatType === 'group') return;
    const ids = [currentUser.uid, chatId].sort();
    const convId = ids.join('_');
    const msgRef = db.collection("privateMessages").doc(convId).collection("messages").doc(messageId);
    await msgRef.update({ status: newStatus }).catch(e => console.warn(e));
  }

  async function openChat(type, id) { 
    if(!currentUser) return; 
    if(messagesUnsub) messagesUnsub(); 
    if(typingUnsub) typingUnsub(); 
    currentChat = { type, id }; 
    await resetUnreadCount(type, id); 
    renderChatList(); 
    let title = ''; 
    if(type==='group') { const snap=await db.collection("groups").doc(id).get(); title=snap.exists?snap.data().name:'Group'; } 
    else { const snap=await db.collection("users").doc(id).get(); title=snap.exists?(snap.data().displayName||id):id; } 
    const header = document.getElementById('desktopChatHeader'); 
    if(header) header.innerHTML = `<i class="${type==='group'?'fas fa-users':'fas fa-user'}"></i> ${escapeHtml(title)}`; 
    const membersBtn = document.getElementById('membersBtn'); 
    if(membersBtn) { membersBtn.style.display = type==='group' ? 'flex' : 'none'; if(type==='group') membersBtn.onclick = () => showGroupMembers(id); } 
    if(type!=='group' && header) header.onclick = () => showUserProfile(id); 
    let messagesRef; 
    if(type==='group') messagesRef = db.collection("groups").doc(id).collection("messages").orderBy("timestamp","asc"); 
    else { const ids=[currentUser.uid,id].sort(); const convId=ids.join('_'); messagesRef = db.collection("privateMessages").doc(convId).collection("messages").orderBy("timestamp","asc"); } 
    messagesUnsub = messagesRef.onSnapshot(async (snap) => { 
      const container = document.getElementById('desktopChatMessages'); 
      if(!container) return;
      container.innerHTML = ''; 
      const processedStatus = new Set();
      for (const doc of snap.docs) {
        const msg = doc.data(); 
        const isSelf = msg.senderId === currentUser.uid; 
        const messageId = doc.id;
        const row = document.createElement('div'); 
        row.className = `message-row ${isSelf?'sent':'received'}`; 
        const bubble = document.createElement('div'); 
        bubble.className = 'message-bubble'; 
        if (currentChat.type === 'group') { 
          const senderSpan = document.createElement('div'); senderSpan.className = 'sender-name'; 
          if (!isSelf) senderSpan.innerHTML = `<i class="fas fa-user-circle"></i> ${escapeHtml(msg.senderName || msg.senderId)}`; 
          else senderSpan.innerHTML = `<i class="fas fa-check-double"></i> You`; 
          senderSpan.onclick = (e) => { e.stopPropagation(); showUserProfile(msg.senderId); };
          bubble.appendChild(senderSpan); 
        } else if(!isSelf) {
          bubble.style.cursor = 'pointer';
          bubble.onclick = () => showUserProfile(msg.senderId);
        }
        const textSpan = document.createElement('div'); textSpan.className = 'message-text'; 
        let text = escapeHtml(msg.text); 
        text = text.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" style="color:#2c6eb3;">$1</a>'); 
        textSpan.innerHTML = text; 
        bubble.appendChild(textSpan); 
        if(msg.attachments && msg.attachments.length){ 
          msg.attachments.forEach(att => { 
            const attDiv = document.createElement('div'); attDiv.className = 'attachment'; 
            if(att.type==='image') attDiv.innerHTML = `<img src="${att.url}" style="max-width:100%; max-height:200px; border-radius:8px;">`; 
            else if(att.type==='video') attDiv.innerHTML = `<video controls src="${att.url}" style="max-width:100%; max-height:200px;"></video>`; 
            else if(att.type==='audio') attDiv.innerHTML = `<audio controls src="${att.url}"></audio>`; 
            else attDiv.innerHTML = `<i class="fas fa-file-alt"></i> <a href="${att.url}" download="${att.name}">${att.name}</a>`; 
            bubble.appendChild(attDiv); 
          }); 
        } 
        const timeSpan = document.createElement('div'); timeSpan.className = 'message-time'; 
        if(msg.timestamp) timeSpan.innerText = formatMessageTime(msg.timestamp); 
        // Status icons for sent messages
        if(isSelf && currentChat.type !== 'group') {
          const statusSpan = document.createElement('span'); statusSpan.className = 'status-icons';
          const currentStatus = msg.status || 'sent';
          if (currentStatus === 'sent') {
            statusSpan.innerHTML = '<i class="fas fa-check sent"></i>';
          } else if (currentStatus === 'delivered') {
            statusSpan.innerHTML = '<i class="fas fa-check delivered"></i><i class="fas fa-check delivered"></i>';
          } else if (currentStatus === 'read') {
            statusSpan.innerHTML = '<i class="fas fa-check read"></i><i class="fas fa-check read"></i>';
          }
          timeSpan.appendChild(statusSpan);
        }
        bubble.appendChild(timeSpan);
        if(isSelf) {
          const actionsDiv = document.createElement('div'); actionsDiv.className = 'message-actions';
          actionsDiv.innerHTML = `<button class="edit-msg"><i class="fas fa-edit"></i></button><button class="delete-msg"><i class="fas fa-trash-alt"></i></button>`;
          actionsDiv.querySelector('.edit-msg').onclick = (e) => { e.stopPropagation(); const newText = prompt("Edit message:", msg.text); if(newText && newText.trim()) { const ref = currentChat.type === 'group' ? db.collection("groups").doc(currentChat.id).collection("messages").doc(messageId) : (()=>{ const ids=[currentUser.uid, currentChat.id].sort(); return db.collection("privateMessages").doc(ids.join('_')).collection("messages").doc(messageId); })(); ref.update({ text: newText.trim() }); } };
          actionsDiv.querySelector('.delete-msg').onclick = async (e) => { e.stopPropagation(); if(confirm("Delete message?")) { const ref = currentChat.type === 'group' ? db.collection("groups").doc(currentChat.id).collection("messages").doc(messageId) : (()=>{ const ids=[currentUser.uid, currentChat.id].sort(); return db.collection("privateMessages").doc(ids.join('_')).collection("messages").doc(messageId); })(); await ref.delete(); } };
          bubble.appendChild(actionsDiv);
        }
        row.appendChild(bubble); 
        container.appendChild(row); 
        // ---- STATUS UPDATE for received messages ----
        if (!isSelf && currentChat.type !== 'group' && !processedStatus.has(messageId)) {
          processedStatus.add(messageId);
          // Immediately mark as delivered if still sent
          if (msg.status === 'sent') {
            await updateMessageStatus(currentChat.type, currentChat.id, messageId, 'delivered');
            // Then after a short delay, mark as read

              updateMessageStatus(currentChat.type, currentChat.id, messageId, 'read');
            }, 1200);
          } else if (msg.status === 'delivered') {
            // Already delivered, mark as read after delay
            setTimeout(() => {
              updateMessageStatus(currentChat.type, currentChat.id, messageId, 'read');
            }, 800);
          }
        }
      }
      container.scrollTop = container.scrollHeight; 
      await resetUnreadCount(type, id); 
      renderChatList(); 
    }); 
    showChatView(); 
  }

  let gameAnimationId=null;
  function showGamesModal(){ if(!currentUser){ alert("Sign in to play"); return; } if(gameAnimationId) cancelAnimationFrame(gameAnimationId); const modal=document.createElement('div'); modal.className='modal'; modal.style.display='flex'; modal.innerHTML=`<div class="modal-card"><h3><i class="fas fa-gamepad"></i> Brick Breaker · Level <span id="levelNum">1</span>/7</h3><div class="game-container"><canvas id="brickCanvas" width="700" height="450" style="width:100%; max-width:700px; aspect-ratio:700/450"></canvas><div class="game-stats"><div>💥 Score: <span id="gameScore">0</span></div><div>❤️ Lives: <span id="gameLives">3</span></div><div>🏆 Level: <span id="gameLevel">1</span></div></div><div class="game-controls"><button id="restartGameBtn" class="game-btn">🔄 Restart</button><button id="closeGameModalBtn" class="game-btn">✖ Close</button></div></div></div>`; document.body.appendChild(modal); const canvas=modal.querySelector('#brickCanvas'), ctx=canvas.getContext('2d'); let gameRunning=true,score=0,lives=3,currentLevel=1; let ball={x:canvas.width/2,y:canvas.height-50,dx:2.6,dy:-3.0,radius:6}; let paddle={width:90,height:12,x:(canvas.width-90)/2}; let bricks=[]; const brickRowColors=['#FF5252','#FFC107','#4CAF50','#2196F3','#9C27B0','#FF9800','#E91E63']; let rightPressed=false,leftPressed=false,mouseX=0; function initLevel(level){ bricks=[]; const rows=Math.min(3+level,9), bricksPerRow=9, brickWidth=(canvas.width-40)/bricksPerRow, brickHeight=18; for(let r=0;r<rows;r++) for(let c=0;c<bricksPerRow;c++) bricks.push({x:20+c*brickWidth,y:50+r*(brickHeight+4),w:brickWidth-2,h:brickHeight,status:1,color:brickRowColors[r%brickRowColors.length]}); let speed=2.6+(level-1)*0.12; ball.dx=ball.dx>0?speed:-speed; ball.dy=-Math.abs(ball.dy); if(ball.dy>-2.7) ball.dy=-2.7; } function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); bricks.forEach(b=>{ if(b.status){ ctx.fillStyle=b.color; ctx.fillRect(b.x,b.y,b.w,b.h); ctx.strokeStyle='#ffffff80'; ctx.strokeRect(b.x,b.y,b.w,b.h); } }); ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2); ctx.fillStyle='#FFD966'; ctx.fill(); ctx.fillStyle='#4a90e2'; ctx.fillRect(paddle.x,canvas.height-paddle.height-5,paddle.width,paddle.height); } async function update(){ if(!gameRunning) return; ball.x+=ball.dx; ball.y+=ball.dy; if(ball.x+ball.radius>canvas.width||ball.x-ball.radius<0) ball.dx=-ball.dx; if(ball.y-ball.radius<0) ball.dy=-ball.dy; if(ball.y+ball.radius>canvas.height){ lives--; document.getElementById('gameLives').innerText=lives; if(lives<=0){ gameRunning=false; alert('Game Over'); return; } ball.x=canvas.width/2; ball.y=canvas.height-50; ball.dx=ball.dx>0?2.6:-2.6; ball.dy=-2.8; paddle.x=(canvas.width-paddle.width)/2; } if(ball.y+ball.radius>=canvas.height-paddle.height-5 && ball.x+ball.radius>paddle.x && ball.x-ball.radius<paddle.x+paddle.width){ let hitPos=(ball.x-paddle.x)/paddle.width; let angle=(hitPos-0.5)*0.9; ball.dx=angle*4.2; ball.dy=-Math.abs(ball.dy); } let allCleared=true; for(let i=0;i<bricks.length;i++){ let b=bricks[i]; if(b.status){ allCleared=false; if(ball.x+ball.radius>b.x && ball.x-ball.radius<b.x+b.w && ball.y+ball.radius>b.y && ball.y-ball.radius<b.y+b.h){ b.status=0; score+=10; document.getElementById('gameScore').innerText=score; let overlapL=(ball.x+ball.radius)-b.x, overlapR=(b.x+b.w)-(ball.x-ball.radius), overlapT=(ball.y+ball.radius)-b.y, overlapB=(b.y+b.h)-(ball.y-ball.radius); if(Math.min(overlapL,overlapR)<Math.min(overlapT,overlapB)) ball.dx=-ball.dx; else ball.dy=-ball.dy; break; } } } if(allCleared){ if(currentLevel<7){ currentLevel++; document.getElementById('levelNum').innerText=currentLevel; document.getElementById('gameLevel').innerText=currentLevel; score+=50; document.getElementById('gameScore').innerText=score; initLevel(currentLevel); ball.x=canvas.width/2; ball.y=canvas.height-50; paddle.x=(canvas.width-paddle.width)/2; } else { gameRunning=false; alert('🎉 Victory!'); modal.remove(); return; } } if(rightPressed && paddle.x<canvas.width-paddle.width) paddle.x+=6; if(leftPressed && paddle.x>0) paddle.x-=6; if(mouseX>0){ let nx=mouseX-paddle.width/2; if(nx<0) nx=0; if(nx>canvas.width-paddle.width) nx=canvas.width-paddle.width; paddle.x=nx; } draw(); gameAnimationId=requestAnimationFrame(update); } function handleMouseMove(e){ const rect=canvas.getBoundingClientRect(); const scaleX=canvas.width/rect.width; let clientX=e.touches?e.touches[0].clientX:e.clientX; mouseX=(clientX-rect.left)*scaleX; } function handleKeyDown(e){ if(e.key==='ArrowRight') rightPressed=true; else if(e.key==='ArrowLeft') leftPressed=true; } function handleKeyUp(e){ if(e.key==='ArrowRight') rightPressed=false; else if(e.key==='ArrowLeft') leftPressed=false; } window.addEventListener('keydown',handleKeyDown); window.addEventListener('keyup',handleKeyUp); canvas.addEventListener('mousemove',handleMouseMove); canvas.addEventListener('touchmove',handleMouseMove); initLevel(1); update(); modal.querySelector('#restartGameBtn').onclick=()=>{ cancelAnimationFrame(gameAnimationId); score=0; lives=3; currentLevel=1; document.getElementById('gameScore').innerText=0; document.getElementById('gameLives').innerText=3; document.getElementById('gameLevel').innerText=1; document.getElementById('levelNum').innerText=1; gameRunning=true; initLevel(1); ball.x=canvas.width/2; ball.y=canvas.height-50; paddle.x=(canvas.width-paddle.width)/2; update(); }; modal.querySelector('#closeGameModalBtn').onclick=()=>{ cancelAnimationFrame(gameAnimationId); window.removeEventListener('keydown',handleKeyDown); window.removeEventListener('keyup',handleKeyUp); modal.remove(); }; modal.addEventListener('click',(e)=>{ if(e.target===modal){ cancelAnimationFrame(gameAnimationId); modal.remove(); } }); }

  // Event listeners
  document.getElementById('floatingToolsBtn').onclick = showToolsMenu;
  document.getElementById('desktopSendBtn').onclick = () => { const inp = document.getElementById('desktopMessageInput'); if(inp && inp.value.trim()) sendMessage(inp.value, []); };
  document.getElementById('desktopAttachBtn').onclick = () => { if(!currentChat.id) return alert("Select a chat first"); const input = document.createElement('input'); input.type='file'; input.accept='image/*,video/*,audio/*,application/pdf'; input.onchange=async(e)=>{ const file=e.target.files[0]; if(!file) return; const fileRef=storage.ref(`attachments/${Date.now()}_${file.name}`); await fileRef.put(file); const url=await fileRef.getDownloadURL(); let type=file.type.split('/')[0]; if(!['image','video','audio'].includes(type)) type='document'; await sendMessage('', [{type,url,name:file.name}]); }; input.click(); };
  document.getElementById('desktopFabPlus').onclick = async () => { const choice = await prompt("New: 1 - Private chat (email) , 2 - Group"); if(choice === '1'){ const email = await prompt("Enter user email:"); if(email){ const usersSnap=await db.collection("users").where("email","==",email.trim()).get(); if(!usersSnap.empty){ const otherId=usersSnap.docs[0].id; await startPrivateChat(otherId); await renderChatList(); } else alert("User not found"); } } else if(choice === '2'){ const name = await prompt("Group name:"); if(name){ const gid = await createGroup(name.trim(), []); if(gid) { await renderChatList(); await openChat('group', gid); } } } };
  document.getElementById('mobileBackBtn').onclick = () => showChatListView();
  const msgInputField = document.getElementById('desktopMessageInput'); if(msgInputField) msgInputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') { e.preventDefault(); if(e.target.value.trim()) sendMessage(e.target.value, []); } });
  document.getElementById('closeProfileModalBtn')?.addEventListener('click',()=>document.getElementById('profileModal').style.display='none');
  document.getElementById('closeMembersModalBtn')?.addEventListener('click',()=>document.getElementById('membersModal').style.display='none');
  document.getElementById('loginTab')?.addEventListener('click',()=>{ document.getElementById('loginPanel').style.display='block'; document.getElementById('signupPanel').style.display='none'; });
  document.getElementById('signupTab')?.addEventListener('click',()=>{ document.getElementById('loginPanel').style.display='none'; document.getElementById('signupPanel').style.display='block'; });
  document.getElementById('doLoginBtn')?.addEventListener('click',async()=>{ try{ await auth.signInWithEmailAndPassword(document.getElementById('loginUsername').value, document.getElementById('loginPassword').value); }catch(e){ document.getElementById('authError').innerText=e.message; } });
  document.getElementById('doSignupBtn')?.addEventListener('click',async()=>{ try{ const cred=await auth.createUserWithEmailAndPassword(document.getElementById('signupUsername').value, document.getElementById('signupPassword').value); await cred.user.updateProfile({ displayName: document.getElementById('signupDisplayName').value }); await db.collection("users").doc(cred.user.uid).set({ displayName: document.getElementById('signupDisplayName').value, email: document.getElementById('signupUsername').value, online:true, lastSeen:firebase.firestore.FieldValue.serverTimestamp(), avatarURL:null }); }catch(e){ document.getElementById('authError').innerText=e.message; } });
  document.getElementById('googleLoginBtn')?.addEventListener('click',async()=>{ try{ await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }catch(e){ document.getElementById('authError').innerText=e.message; } });
  document.getElementById('closeModalBtn')?.addEventListener('click',()=>document.getElementById('authModal').style.display='none');
  window.addEventListener('resize', () => { if(!isMobile() && document.body.classList.contains('mobile-chat-active')) document.body.classList.remove('mobile-chat-active'); });
</script>
