<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Whispers · Profile, Avatars, Games & Groups</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #121212;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    :root {
      --app-bg: #e8f4fd;
      --sidebar-bg: #ffffff;
      --sidebar-hover: #e3f0fa;
      --sidebar-active: #d4e8f5;
      --header-gradient-start: #4a90e2;
      --header-gradient-end: #2c6eb3;
      --header-text: white;
      --chat-bg: #e8f4fd;
      --chat-bg-pattern: radial-gradient(circle at 10% 30%, rgba(74,144,226,0.08) 2%, transparent 2.5%);
      --sent-bubble: #cce4f7;
      --sent-bubble-text: #1a3c5e;
      --received-bubble: white;
      --received-bubble-text: #1a2a3a;
      --sender-name-color: #4a90e2;
      --received-sender-color: #2c6eb3;
      --input-area-bg: #ffffff;
      --input-bg: #f0f8ff;
      --input-border-focus: #4a90e2;
      --send-btn-bg: #4a90e2;
      --send-btn-hover: #2c6eb3;
      --time-color: #6b7b8c;
      --border-color: #cde0ec;
    }
    body { background: var(--app-bg); }
    .whispers-app {
      width: 100%;
      max-width: 1100px;
      height: 95vh;
      max-height: 800px;
      background: var(--app-bg);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
      overflow: hidden;
      position: relative;
    }
    .desktop-layout { display: flex; height: 100%; width: 100%; }
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .sidebar-header {
      padding: 16px;
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .profile-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
      cursor: pointer;
      border: 2px solid white;
    }
    .profile-avatar-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #87CEEB;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      color: white;
      cursor: pointer;
    }
    .sidebar-header h2 { font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .logout-icon {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 40px;
      cursor: pointer;
    }
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 80px 0;
    }
    .chat-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .chat-list-item:hover { background: var(--sidebar-hover); }
    .chat-list-item.active {
      background: var(--sidebar-active);
      border-left-color: var(--header-gradient-start);
    }
    .chat-avatar {
      width: 48px;
      height: 48px;
      background: var(--header-gradient-start);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-preview {
      font-size: 12px;
      color: var(--time-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .fab-plus {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: var(--send-btn-bg);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    /* NEW FLOATING GAME MENU - vertically stacked above plus button */
    .floating-game-menu {
      position: absolute;
      bottom: 90px;
      right: 20px;
      background: white;
      border-radius: 32px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
      z-index: 12;
      backdrop-filter: blur(2px);
      transition: all 0.2s ease;
    }
    .game-menu-btn {
      background: transparent;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2c6eb3;
      transition: 0.2s;
    }
    .game-menu-btn:hover {
      background: var(--sidebar-hover);
      transform: scale(1.05);
    }
    /* Mobile game menu (above mobile fab) */
    .mobile-game-menu {
      position: absolute;
      bottom: 90px;
      right: 20px;
      background: white;
      border-radius: 32px;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      z-index: 15;
    }
    .plus-menu {
      position: absolute;
      bottom: 80px;
      right: 20px;
      background: var(--received-bubble);
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      overflow: hidden;
      z-index: 20;
      display: flex;
      flex-direction: column;
      min-width: 180px;
    }
    .plus-menu-item {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--received-bubble-text);
    }
    .plus-menu-item:hover { background: var(--sidebar-hover); }
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--chat-bg);
      background-image: var(--chat-bg-pattern);
    }
    .chat-header {
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--header-text);
    }
    .chat-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .chat-subtitle { font-size: 12px; opacity: 0.9; }
    .admin-controls { display: flex; gap: 8px; }
    .btn-icon {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 40px;
      cursor: pointer;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message-row { display: flex; width: 100%; animation: fadeSlideUp 0.2s; }
    .message-row.sent { justify-content: flex-end; }
    .message-row.received { justify-content: flex-start; }
    .message-bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 22px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.05);
    }
    .sent .message-bubble {
      background: var(--sent-bubble);
      border-bottom-right-radius: 6px;
      color: var(--sent-bubble-text);
    }
    .received .message-bubble {
      background: var(--received-bubble);
      border-bottom-left-radius: 6px;
      color: var(--received-bubble-text);
    }
    .sender-name {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--sender-name-color);
    }
    .received .sender-name { color: var(--received-sender-color); }
    .message-text { font-size: 14px; line-height: 1.4; word-break: break-word; }
    .attachment { margin-top: 8px; background: rgba(0,0,0,0.05); border-radius: 12px; padding: 8px; display: flex; align-items: center; gap: 8px; }
    .attachment img, .attachment video, .attachment audio { max-width: 100%; max-height: 200px; border-radius: 8px; }
    .message-time { font-size: 10px; color: var(--time-color); margin-top: 5px; text-align: right; }
    .input-area {
      background: var(--input-area-bg);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border-color);
    }
    .input-area input { flex: 1; border: none; background: var(--input-bg); padding: 12px 18px; border-radius: 30px; font-size: 15px; outline: none; }
    .input-area button { background: var(--send-btn-bg); border: none; color: white; width: 44px; height: 44px; border-radius: 30px; cursor: pointer; font-size: 20px; }
    .attach-btn { background: var(--simulate-btn-bg); color: var(--simulate-btn-text); width: auto; padding: 0 12px; }
    .mobile-layout {
      display: none;
      height: 100%;
      width: 100%;
      position: relative;
    }
    .mobile-view {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background: var(--app-bg);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .mobile-view.list-view { transform: translateX(0); }
    .mobile-view.chat-view { transform: translateX(100%); }
    .mobile-header {
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
    }
    .mobile-back-btn { background: transparent; border: none; color: white; font-size: 20px; cursor: pointer; }
    .mobile-chat-list { flex: 1; overflow-y: auto; padding: 8px 0 80px 0; }
    .mobile-fab {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: var(--send-btn-bg);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-card {
      background: white;
      width: 380px;
      max-width: 90vw;
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-card h3 { margin-bottom: 12px; }
    .modal-card input, .modal-card textarea { width: 100%; margin: 8px 0; padding: 8px 12px; border-radius: 20px; border: 1px solid #ccc; }
    .modal-card button { background: #4a90e2; color: white; border: none; padding: 10px 20px; border-radius: 40px; margin: 5px; cursor: pointer; }
    .member-checkbox { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #eee; }
    .admin-badge { background: #4a90e2; color: white; border-radius: 20px; padding: 2px 8px; font-size: 11px; margin-left: 8px; }
    .profile-avatar-large { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; cursor: pointer; }
    .avatar-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; max-height: 200px; overflow-y: auto; }
    .avatar-option { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid transparent; transition: 0.1s; }
    .avatar-option:hover { transform: scale(1.05); border-color: #4a90e2; }
    /* game modal board styles */
    .game-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 240px;
      margin: 16px auto;
    }
    .cell {
      background: #f0f8ff;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .cell:hover { background: #e0ecf5; }
    .game-status { font-weight: 600; margin: 12px 0; }
    .rps-buttons { display: flex; gap: 16px; justify-content: center; margin: 16px 0; }
    .rps-btn { background: #e0ecf5; border: none; font-size: 40px; padding: 12px; border-radius: 60px; cursor: pointer; width: 80px; transition: 0.1s; }
    .rps-btn:hover { background: #cce4f7; transform: scale(1.05); }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 768px) {
      .desktop-layout { display: none; }
      .mobile-layout { display: block; }
      .floating-game-menu { display: none; }
      .mobile-game-menu { display: flex; }
    }
    @media (min-width: 769px) {
      .mobile-layout { display: none; }
      .desktop-layout { display: flex; }
      .mobile-game-menu { display: none; }
    }
  </style>
</head>
<body>

<div class="whispers-app">
  <!-- Desktop Layout -->
  <div class="desktop-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div style="display: flex; align-items: center; gap: 10px;"><div id="desktopProfileAvatar"></div><h2>Whispers</h2></div>
        <button id="desktopLogoutBtn" class="logout-icon"><i class="fas fa-sign-out-alt"></i></button>
      </div>
      <div class="chat-list" id="desktopChatList"></div>
      <button id="desktopFabPlus" class="fab-plus"><i class="fas fa-plus"></i></button>
    </div>
    <div class="main-chat">
      <div class="chat-header" id="desktopChatHeader"></div>
      <div class="chat-messages" id="desktopChatMessages"></div>
      <div class="input-area">
        <button id="desktopAttachBtn" class="attach-btn"><i class="fas fa-paperclip"></i></button>
        <input type="text" id="desktopMessageInput" placeholder="Aa">
        <button id="desktopSendBtn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <!-- Mobile Layout -->
  <div class="mobile-layout">
    <div id="mobileListView" class="mobile-view list-view">
      <div class="mobile-header"><div style="display: flex; align-items: center; gap: 10px;"><div id="mobileProfileAvatar"></div><h2 style="margin:0;">Whispers</h2></div><button id="mobileLogoutBtn" class="logout-icon"><i class="fas fa-sign-out-alt"></i></button></div>
      <div class="mobile-chat-list" id="mobileChatList"></div>
      <button id="mobileFabPlus" class="mobile-fab"><i class="fas fa-plus"></i></button>
    </div>
    <div id="mobileChatView" class="mobile-view chat-view">
      <div class="mobile-header"><button id="mobileBackBtn" class="mobile-back-btn"><i class="fas fa-arrow-left"></i></button><div id="mobileChatTitle" style="flex:1;"></div><div id="mobileAdminControls"></div></div>
      <div class="chat-messages" id="mobileChatMessages"></div>
      <div class="input-area"><button id="mobileAttachBtn" class="attach-btn"><i class="fas fa-paperclip"></i></button><input type="text" id="mobileMessageInput" placeholder="Aa"><button id="mobileSendBtn"><i class="fas fa-paper-plane"></i></button></div>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div id="authModal" class="modal" style="display: flex;">
  <div class="modal-card"><div style="display: flex; justify-content: center; margin-bottom: 10px;"><div style="width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #87CEEB, #FF69B4); display: flex; align-items: center; justify-content: center; font-size: 30px; color: white;">W</div></div><h3>Welcome to Whispers</h3><div id="authTabs" style="display: flex; gap: 10px; margin-bottom: 15px;"><button id="loginTab" style="background:#4a90e2;">Login</button><button id="signupTab">Sign Up</button></div>
    <div id="loginPanel"><input type="email" id="loginUsername" placeholder="Email"><input type="password" id="loginPassword" placeholder="Password"><button id="doLoginBtn">Login</button><div style="margin-top: 15px;"><hr><p>Google account?</p><button id="googleLoginBtn" style="background:#db4437;"><i class="fab fa-google"></i> Google</button></div></div>
    <div id="signupPanel" style="display:none;"><input type="email" id="signupUsername" placeholder="Email"><input type="password" id="signupPassword" placeholder="Password"><input type="text" id="signupDisplayName" placeholder="Display Name"><button id="doSignupBtn">Create Account</button></div>
    <div id="authError" style="color:red; margin-top:10px;"></div><button id="closeModalBtn">Cancel</button>
  </div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal"><div class="modal-card"><h3>Your Profile</h3><div style="display: flex; justify-content: center;"><img id="profileAvatarImg" class="profile-avatar-large" src="" alt="Avatar"></div><input type="text" id="profileDisplayName" placeholder="Display Name"><button id="uploadAvatarBtn">Upload New Avatar</button><div><hr><p>Choose default avatar</p></div><div id="avatarGallery" class="avatar-gallery"></div><button id="saveProfileBtn">Save Changes</button><button id="closeProfileModalBtn">Cancel</button><input type="file" id="avatarFileInput" accept="image/*" style="display: none;"></div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, query, orderBy, serverTimestamp, setDoc, getDoc, arrayUnion, arrayRemove, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAmgvzZju_GbPdUDDHqFg4AN54xnJ4LwW8",
    authDomain: "whispers-4d04e.firebaseapp.com",
    projectId: "whispers-4d04e",
    storageBucket: "whispers-4d04e.firebasestorage.app",
    messagingSenderId: "32971948813",
    appId: "1:32971948813:web:3ea4e8a242c055a7e52644",
    measurementId: "G-K4N3XEBZKK"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  let currentUser = null, currentUserData = null, currentChat = { type: 'group', id: null }, typingTimeout = null, onlineInterval = null, isMobile = window.innerWidth <= 768, messagesUnsub = null, typingUnsub = null;

  // DOM refs
  const desktopChatList = document.getElementById('desktopChatList'), mobileChatList = document.getElementById('mobileChatList');
  const desktopMessages = document.getElementById('desktopChatMessages'), mobileMessages = document.getElementById('mobileChatMessages');
  const desktopHeader = document.getElementById('desktopChatHeader'), mobileChatTitle = document.getElementById('mobileChatTitle'), mobileAdminControls = document.getElementById('mobileAdminControls');
  const desktopFab = document.getElementById('desktopFabPlus'), mobileFab = document.getElementById('mobileFabPlus');
  const desktopSend = document.getElementById('desktopSendBtn'), mobileSend = document.getElementById('mobileSendBtn');
  const desktopInput = document.getElementById('desktopMessageInput'), mobileInput = document.getElementById('mobileMessageInput');
  const desktopAttach = document.getElementById('desktopAttachBtn'), mobileAttach = document.getElementById('mobileAttachBtn');
  const mobileBack = document.getElementById('mobileBackBtn'), desktopLogout = document.getElementById('desktopLogoutBtn'), mobileLogout = document.getElementById('mobileLogoutBtn');
  const desktopProfileAvatar = document.getElementById('desktopProfileAvatar'), mobileProfileAvatar = document.getElementById('mobileProfileAvatar');

  function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
  const defaultAvatars = ["https://cdn.jsdelivr.net/gh/alohe/memojis/png/teams_5.png","https://cdn.jsdelivr.net/gh/alohe/memojis/png/memo_16.png","https://cdn.jsdelivr.net/gh/alohe/memojis/png/vibrent_9.png",'https://cdn.jsdelivr.net/gh/alohe/memojis/png/vibrent_3.png','https://tse3.mm.bing.net/th/id/OIP.SyvBO6QMNZ8kZtiXz2G0GQAAAA?pid=ImgDet&w=440&h=440&rs=1&o=7&rm=3'];

  async function updateUserProfile(displayName, avatarURL) { if (!currentUser) return; const updates = {}; if (displayName !== undefined) updates.displayName = displayName; if (avatarURL !== undefined) updates.avatarURL = avatarURL; if (Object.keys(updates).length) await updateDoc(doc(db, 'users', currentUser.uid), updates); if (displayName && displayName !== currentUser.displayName) await updateProfile(auth.currentUser, { displayName }); currentUserData = { ...currentUserData, ...updates }; renderProfileAvatar(); renderChatList(); }
  async function uploadAvatar(file) { const storageRef = ref(storage, `avatars/${currentUser.uid}`); await uploadBytes(storageRef, file); const url = await getDownloadURL(storageRef); await updateUserProfile(undefined, url); return url; }
  function renderProfileAvatar() { const avatarUrl = currentUserData?.avatarURL; const initial = (currentUserData?.displayName || currentUser?.email || 'U').charAt(0).toUpperCase(); const avatarHtml = avatarUrl ? `<img src="${avatarUrl}" class="profile-avatar" alt="Avatar">` : `<div class="profile-avatar-placeholder">${initial}</div>`; if (desktopProfileAvatar) { desktopProfileAvatar.innerHTML = avatarHtml; desktopProfileAvatar.firstChild?.addEventListener('click', showProfileModal); } if (mobileProfileAvatar) { mobileProfileAvatar.innerHTML = avatarHtml; mobileProfileAvatar.firstChild?.addEventListener('click', showProfileModal); } }

  function showGamesModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `<div class="modal-card" style="max-width:460px;"><h3><i class="fas fa-gamepad"></i> Game Hub</h3><div style="display:flex; gap:12px; justify-content:center; margin-bottom:10px;"><button id="gameTicTacBtn" class="btn-icon" style="background:#4a90e2; color:white; padding:6px 12px;">Tic-Tac-Toe</button><button id="gameRpsBtn" class="btn-icon" style="background:#2c6eb3; color:white; padding:6px 12px;">Rock Paper Scissors</button></div><div id="gameContentArea"><div id="tttGameArea"></div><div id="rpsGameArea" style="display:none;"></div></div><button id="closeGameModalBtn" style="margin-top:12px;">Close</button></div>`;
    document.body.appendChild(modal);
    const tttDiv = modal.querySelector('#tttGameArea');
    const rpsDiv = modal.querySelector('#rpsGameArea');
    let board = ['','','','','','','','',''];
    let currentPlayer = 'X';
    let gameActive = true;
    function renderTicTacToe() {
      tttDiv.innerHTML = `<div class="game-board" id="ticBoard"></div><div class="game-status" id="gameStatus">Player X's turn</div><button id="resetTicBtn" style="background:#4a90e2;">Reset Game</button>`;
      const boardContainer = tttDiv.querySelector('#ticBoard');
      for (let i=0;i<9;i++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.textContent = board[i];
        cell.dataset.index = i;
        cell.addEventListener('click', () => handleCellClick(i));
        boardContainer.appendChild(cell);
      }
      const statusDiv = tttDiv.querySelector('#gameStatus');
      const resetBtn = tttDiv.querySelector('#resetTicBtn');
      resetBtn.addEventListener('click', () => { board = ['','','','','','','','','']; currentPlayer='X'; gameActive=true; renderTicTacToe(); });
      function handleCellClick(idx) {
        if (!gameActive || board[idx] !== '') return;
        board[idx] = currentPlayer;
        const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        let winner = null;
        for (let pattern of winPatterns) { const [a,b,c] = pattern; if (board[a] && board[a]===board[b] && board[a]===board[c]) { winner = board[a]; break; } }
        const isDraw = !winner && board.every(cell => cell !== '');
        if (winner) { statusDiv.innerText = `🎉 Player ${winner} wins!`; gameActive = false; }
        else if (isDraw) { statusDiv.innerText = `It's a draw!`; gameActive = false; }
        else { currentPlayer = currentPlayer === 'X' ? 'O' : 'X'; statusDiv.innerText = `Player ${currentPlayer}'s turn`; }
        renderTicTacToe();
      }
    }
    function renderRPS() {
      rpsDiv.innerHTML = `<div class="rps-buttons"><button class="rps-btn" data-choice="rock">🪨</button><button class="rps-btn" data-choice="paper">📄</button><button class="rps-btn" data-choice="scissors">✂️</button></div><div class="game-status" id="rpsResult">Click to play vs Computer</div>`;
      const btns = rpsDiv.querySelectorAll('.rps-btn');
      const resultDiv = rpsDiv.querySelector('#rpsResult');
      btns.forEach(btn => btn.addEventListener('click', (e) => { const playerChoice = btn.dataset.choice; const choices = ['rock','paper','scissors']; const compChoice = choices[Math.floor(Math.random()*3)]; let result=''; if (playerChoice===compChoice) result="It's a tie!"; else if ((playerChoice==='rock' && compChoice==='scissors') || (playerChoice==='scissors' && compChoice==='paper') || (playerChoice==='paper' && compChoice==='rock')) result='🎉 You win!'; else result='😵 Computer wins!'; resultDiv.innerHTML = `You chose ${playerChoice} 🤖 Computer chose ${compChoice}. ${result}`; }));
    }
    const ticBtn = modal.querySelector('#gameTicTacBtn');
    const rpsBtn = modal.querySelector('#gameRpsBtn');
    ticBtn.onclick = () => { tttDiv.style.display = 'block'; rpsDiv.style.display = 'none'; renderTicTacToe(); };
    rpsBtn.onclick = () => { tttDiv.style.display = 'none'; rpsDiv.style.display = 'block'; renderRPS(); };
    modal.querySelector('#closeGameModalBtn').onclick = () => modal.remove();
    renderTicTacToe();
    rpsDiv.style.display = 'none';
  }
