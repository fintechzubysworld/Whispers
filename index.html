<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Whispers · Floating + Button</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #121212;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.2s;
    }
    :root {
      --app-bg: #f0f2f5;
      --sidebar-bg: #ffffff;
      --sidebar-hover: #f0f2f5;
      --sidebar-active: #e7f3ff;
      --header-gradient-start: #075e54;
      --header-gradient-end: #128c7e;
      --header-text: white;
      --chat-bg: #f0f2f5;
      --chat-bg-pattern: radial-gradient(circle at 10% 30%, rgba(220,240,245,0.3) 2%, transparent 2.5%);
      --sent-bubble: #dcf8c5;
      --sent-bubble-text: #111;
      --received-bubble: white;
      --received-bubble-text: #1f2c3e;
      --sender-name-color: #075e54;
      --received-sender-color: #128c7e;
      --input-area-bg: #ffffff;
      --input-bg: #f3f5f7;
      --input-border-focus: #25d36650;
      --send-btn-bg: #075e54;
      --send-btn-hover: #128c7e;
      --simulate-btn-bg: #e4e6eb;
      --simulate-btn-text: #1b2a3f;
      --time-color: #6b6f76;
      --border-color: #e9ecef;
    }
    body { background: var(--app-bg); }
    .whispers-app {
      width: 100%;
      max-width: 1100px;
      height: 95vh;
      max-height: 800px;
      background: var(--app-bg);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
      overflow: hidden;
      transition: background 0.2s;
      position: relative;
    }
    /* Desktop Layout */
    .desktop-layout {
      display: flex;
      height: 100%;
      width: 100%;
    }
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .sidebar-header {
      padding: 16px;
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header h2 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logout-icon {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }
    .logout-icon:hover {
      background: rgba(255,255,255,0.35);
      transform: scale(0.96);
    }
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 80px 0; /* make room for floating button */
    }
    .chat-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }
    .chat-list-item:hover { background: var(--sidebar-hover); }
    .chat-list-item.active {
      background: var(--sidebar-active);
      border-left-color: var(--header-gradient-start);
    }
    .chat-avatar {
      width: 48px;
      height: 48px;
      background: var(--header-gradient-start);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      flex-shrink: 0;
    }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-preview {
      font-size: 12px;
      color: var(--time-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    /* Floating plus button */
    .fab-plus {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: var(--send-btn-bg);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      z-index: 10;
    }
    .fab-plus:hover {
      background: var(--send-btn-hover);
      transform: scale(1.05);
    }
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--chat-bg);
      background-image: var(--chat-bg-pattern);
    }
    .chat-header {
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--header-text);
    }
    .chat-title {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-subtitle { font-size: 12px; opacity: 0.9; }
    .admin-controls { display: flex; gap: 8px; }
    .btn-icon {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 40px;
      cursor: pointer;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message-row { display: flex; width: 100%; animation: fadeSlideUp 0.2s; }
    .message-row.sent { justify-content: flex-end; }
    .message-row.received { justify-content: flex-start; }
    .message-bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 22px;
      position: relative;
      box-shadow: 0 1px 1px rgba(0,0,0,0.05);
    }
    .sent .message-bubble {
      background: var(--sent-bubble);
      border-bottom-right-radius: 6px;
      color: var(--sent-bubble-text);
    }
    .received .message-bubble {
      background: var(--received-bubble);
      border-bottom-left-radius: 6px;
      color: var(--received-bubble-text);
    }
    .sender-name {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--sender-name-color);
    }
    .received .sender-name { color: var(--received-sender-color); }
    .message-text { font-size: 14px; line-height: 1.4; word-break: break-word; }
    .message-text a { color: #075e54; text-decoration: none; }
    .attachment {
      margin-top: 8px;
      background: rgba(0,0,0,0.05);
      border-radius: 12px;
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .attachment img, .attachment video, .attachment audio {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
    }
    .message-time {
      font-size: 10px;
      color: var(--time-color);
      margin-top: 5px;
      text-align: right;
    }
    .input-area {
      background: var(--input-area-bg);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border-color);
    }
    .input-area input {
      flex: 1;
      border: none;
      background: var(--input-bg);
      padding: 12px 18px;
      border-radius: 30px;
      font-size: 15px;
      outline: none;
    }
    .input-area button {
      background: var(--send-btn-bg);
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 20px;
    }
    .attach-btn {
      background: var(--simulate-btn-bg);
      color: var(--simulate-btn-text);
      width: auto;
      padding: 0 12px;
    }
    /* Mobile Layout */
    .mobile-layout {
      display: none;
      height: 100%;
      width: 100%;
      position: relative;
    }
    .mobile-view {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background: var(--app-bg);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .mobile-view.list-view { transform: translateX(0); }
    .mobile-view.chat-view { transform: translateX(100%); }
    .mobile-header {
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
    }
    .mobile-header h2 { font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .mobile-back-btn {
      background: transparent;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
    .mobile-chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 80px 0;
    }
    .mobile-fab {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: var(--send-btn-bg);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-card {
      background: white;
      width: 340px;
      max-width: 90vw;
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-card h3 { margin-bottom: 12px; }
    .modal-card input, .modal-card select {
      width: 100%;
      margin: 8px 0;
      padding: 8px 12px;
      border-radius: 40px;
      border: 1px solid #ccc;
    }
    .modal-card button {
      background: #075e54;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      margin: 5px;
      cursor: pointer;
    }
    .theme-grid { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
    .theme-btn {
      background: #f0f2f5;
      border: 1px solid #ddd;
      padding: 8px;
      border-radius: 40px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 768px) {
      .desktop-layout { display: none; }
      .mobile-layout { display: block; }
    }
    @media (min-width: 769px) {
      .mobile-layout { display: none; }
      .desktop-layout { display: flex; }
    }
  </style>
</head>
<body>

<div class="whispers-app">
  <!-- Desktop Layout -->
  <div class="desktop-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2><i class="fab fa-whatsapp"></i> Whispers</h2>
        <button id="desktopLogoutBtn" class="logout-icon" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
      <div class="chat-list" id="desktopChatList"></div>
      <button id="desktopFabPlus" class="fab-plus" title="New private chat"><i class="fas fa-plus"></i></button>
    </div>
    <div class="main-chat">
      <div class="chat-header" id="desktopChatHeader"></div>
      <div class="chat-messages" id="desktopChatMessages"></div>
      <div class="input-area">
        <button id="desktopAttachBtn" class="attach-btn"><i class="fas fa-paperclip"></i></button>
        <input type="text" id="desktopMessageInput" placeholder="Aa" autocomplete="off">
        <button id="desktopSendBtn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <!-- Mobile Layout -->
  <div class="mobile-layout">
    <div id="mobileListView" class="mobile-view list-view">
      <div class="mobile-header">
        <h2><i class="fab fa-whatsapp"></i> Whispers</h2>
        <button id="mobileLogoutBtn" class="logout-icon" style="background:rgba(255,255,255,0.2);"><i class="fas fa-sign-out-alt"></i></button>
      </div>
      <div class="mobile-chat-list" id="mobileChatList"></div>
      <button id="mobileFabPlus" class="mobile-fab"><i class="fas fa-plus"></i></button>
    </div>
    <div id="mobileChatView" class="mobile-view chat-view">
      <div class="mobile-header">
        <button id="mobileBackBtn" class="mobile-back-btn"><i class="fas fa-arrow-left"></i></button>
        <div id="mobileChatTitle" style="flex:1; font-weight:600;"></div>
        <div id="mobileAdminControls"></div>
      </div>
      <div class="chat-messages" id="mobileChatMessages"></div>
      <div class="input-area">
        <button id="mobileAttachBtn" class="attach-btn"><i class="fas fa-paperclip"></i></button>
        <input type="text" id="mobileMessageInput" placeholder="Aa" autocomplete="off">
        <button id="mobileSendBtn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<!-- Authentication Modal -->
<div id="authModal" class="modal">
  <div class="modal-card">
    <i class="fab fa-whatsapp" style="font-size: 40px; color:#075e54;"></i>
    <h3>Welcome to Whispers</h3>
    <div id="authTabs" style="display: flex; gap: 10px; margin-bottom: 15px;">
      <button id="loginTab" style="background:#075e54;">Login</button>
      <button id="signupTab">Sign Up</button>
    </div>
    <div id="loginPanel">
      <input type="text" id="loginUsername" placeholder="Username">
      <input type="password" id="loginPassword" placeholder="Password">
      <button id="doLoginBtn">Login</button>
      <div style="margin-top: 15px;"><hr><p style="margin: 10px 0;">Federated Login</p>
        <button id="googleLoginBtn" style="background:#db4437;"><i class="fab fa-google"></i> Google</button>
        <button id="facebookLoginBtn" style="background:#4267B2;"><i class="fab fa-facebook"></i> Facebook</button>
      </div>
    </div>
    <div id="signupPanel" style="display:none;">
      <input type="text" id="signupUsername" placeholder="Username">
      <input type="password" id="signupPassword" placeholder="Password">
      <input type="text" id="signupDisplayName" placeholder="Display Name">
      <button id="doSignupBtn">Create Account</button>
    </div>
    <div id="authError" class="error-msg" style="color:red; margin-top:10px;"></div>
  </div>
</div>

<!-- Admin & Member Modals -->
<div id="addMemberModal" class="modal">
  <div class="modal-card">
    <h3>Add Group Member</h3>
    <input type="text" id="newMemberName" placeholder="Member Name">
    <button id="confirmAddMemberBtn">Add</button>
    <button id="closeAddMemberBtn">Cancel</button>
  </div>
</div>
<div id="themeModal" class="modal">
  <div class="modal-card">
    <h3>Themes</h3>
    <div id="themeListContainer"></div>
    <button id="closeThemeModal">Close</button>
  </div>
</div>

<script>
  // ---------- DATA MODELS ----------
  let currentUser = null;
  let groupMessages = [];
  let privateMessages = {};
  let privateChats = [];
  let groupMembers = [];
  let currentChat = { type: 'group', id: null };
  let isGroupAdmin = false;
  let currentThemeId = "light";
  let isMobile = window.innerWidth <= 768;

  const DEFAULT_MEMBERS = [
    { id: "alexia", name: "Alexia" },
    { id: "jordan", name: "Jordan" },
    { id: "taylor", name: "Taylor" },
    { id: "riley", name: "Riley" }
  ];

  // ---------- THEME SYSTEM ----------
  const builtinThemes = {
    light: { name: "☀️ Light", vars: { '--app-bg': '#f0f2f5', '--sidebar-bg': '#ffffff', '--sidebar-hover': '#f0f2f5', '--sidebar-active': '#e7f3ff', '--header-gradient-start': '#075e54', '--header-gradient-end': '#128c7e', '--chat-bg': '#f0f2f5', '--chat-bg-pattern': 'radial-gradient(circle at 10% 30%, rgba(220,240,245,0.3) 2%, transparent 2.5%)', '--sent-bubble': '#dcf8c5', '--sent-bubble-text': '#111', '--received-bubble': 'white', '--received-bubble-text': '#1f2c3e', '--sender-name-color': '#075e54', '--received-sender-color': '#128c7e', '--input-area-bg': '#ffffff', '--input-bg': '#f3f5f7', '--input-border-focus': '#25d36650', '--send-btn-bg': '#075e54', '--send-btn-hover': '#128c7e', '--simulate-btn-bg': '#e4e6eb', '--simulate-btn-text': '#1b2a3f', '--time-color': '#6b6f76', '--border-color': '#e9ecef' } },
    dark: { name: "🌙 Dark", vars: { '--app-bg': '#1e1e2f', '--sidebar-bg': '#2a2a3a', '--sidebar-hover': '#35354a', '--sidebar-active': '#2d3b66', '--header-gradient-start': '#0a2f2a', '--header-gradient-end': '#1f4e46', '--chat-bg': '#1a1a2a', '--chat-bg-pattern': 'radial-gradient(circle at 10% 30%, rgba(90,120,120,0.1) 2%, transparent 2.5%)', '--sent-bubble': '#2a5e5a', '--sent-bubble-text': '#f0f0f0', '--received-bubble': '#2d2d3a', '--received-bubble-text': '#e0e0e0', '--sender-name-color': '#6fbfb0', '--received-sender-color': '#68b8a8', '--input-area-bg': '#232332', '--input-bg': '#2e2e42', '--input-border-focus': '#2ecc71', '--send-btn-bg': '#1f8a7a', '--send-btn-hover': '#2aa090', '--simulate-btn-bg': '#35354a', '--simulate-btn-text': '#e2e2e2', '--time-color': '#a0a0b0', '--border-color': '#35354a' } }
  };
  let customThemes = [];
  function applyThemeById(id) {
    let vars = null;
    if (builtinThemes[id]) vars = builtinThemes[id].vars;
    else vars = customThemes.find(t=>t.id===id)?.vars;
    if(vars) for(let [prop,val] of Object.entries(vars)) document.documentElement.style.setProperty(prop, val);
    currentThemeId = id;
    localStorage.setItem("whispers_theme", id);
  }
  function loadTheme() { let saved = localStorage.getItem("whispers_theme"); if(saved && (builtinThemes[saved]||customThemes.some(t=>t.id===saved))) applyThemeById(saved); else applyThemeById("light"); }

  // ---------- DATA PERSISTENCE ----------
  function loadData() {
    const storedGroup = localStorage.getItem("whispers_group_messages");
    groupMessages = storedGroup ? JSON.parse(storedGroup) : [
      { id: Date.now()+1, text: "Welcome to Whispers! 🎉", sender: "Emma", isSelf: false, timestamp: new Date().toLocaleTimeString(), attachments: [] },
      { id: Date.now()+2, text: "You can share images, videos, documents, and links.", sender: "System", isSelf: false, timestamp: new Date().toLocaleTimeString(), attachments: [] }
    ];
    privateMessages = JSON.parse(localStorage.getItem("whispers_private_messages") || "{}");
    privateChats = JSON.parse(localStorage.getItem("whispers_private_chats") || "[]");
    groupMembers = JSON.parse(localStorage.getItem("whispers_group_members") || JSON.stringify(DEFAULT_MEMBERS));
    if(!localStorage.getItem("whispers_groupName")) localStorage.setItem("whispers_groupName", "Whispers Squad");
    saveAll();
  }
  function saveAll() {
    localStorage.setItem("whispers_group_messages", JSON.stringify(groupMessages));
    localStorage.setItem("whispers_private_messages", JSON.stringify(privateMessages));
    localStorage.setItem("whispers_private_chats", JSON.stringify(privateChats));
    localStorage.setItem("whispers_group_members", JSON.stringify(groupMembers));
  }

  function updatePrivateChatPreview(userId, lastMsg, timestamp) {
    let chat = privateChats.find(c=>c.userId===userId);
    if(chat) { chat.lastMessage = lastMsg; chat.lastTimestamp = timestamp; }
    else {
      let name = groupMembers.find(m=>m.id===userId)?.name || userId;
      privateChats.push({ userId, name, lastMessage: lastMsg, lastTimestamp: timestamp });
    }
    saveAll();
    renderChatLists();
  }

  function addSystemNotification(text, chatType='group', chatId=null) {
    let msg = { id: Date.now(), text: `🔔 ${text}`, sender: "System", isSelf: false, timestamp: new Date().toLocaleTimeString(), attachments: [] };
    if(chatType==='group') { groupMessages.push(msg); saveAll(); if(currentChat.type==='group') renderMessages(); }
    else if(chatType==='private' && chatId) {
      if(!privateMessages[chatId]) privateMessages[chatId]=[];
      privateMessages[chatId].push(msg);
      updatePrivateChatPreview(chatId, msg.text, msg.timestamp);
      if(currentChat.type==='private' && currentChat.id===chatId) renderMessages();
    }
    renderChatLists();
  }

  // ---------- RENDERING HELPERS ----------
  function renderChatLists() {
    // Desktop
    const desktopContainer = document.getElementById("desktopChatList");
    if(desktopContainer) {
      desktopContainer.innerHTML = "";
      let groupItem = createChatListItem('group', null, localStorage.getItem("whispers_groupName"), groupMessages[groupMessages.length-1]?.text || "No messages");
      groupItem.addEventListener("click",()=>{ currentChat={type:'group',id:null}; renderActiveChatDesktop(); renderChatLists(); });
      desktopContainer.appendChild(groupItem);
      privateChats.sort((a,b)=>(b.lastTimestamp||"").localeCompare(a.lastTimestamp||""));
      privateChats.forEach(chat=>{
        let item = createChatListItem('private', chat.userId, chat.name, chat.lastMessage || "Start chatting");
        item.addEventListener("click",()=>{ currentChat={type:'private', id:chat.userId}; renderActiveChatDesktop(); renderChatLists(); });
        desktopContainer.appendChild(item);
      });
      document.querySelectorAll("#desktopChatList .chat-list-item").forEach(el => {
        let type = el.dataset.type;
        let id = el.dataset.id;
        if (type === currentChat.type && (id === (currentChat.id || null))) el.classList.add("active");
        else el.classList.remove("active");
      });
    }
    // Mobile list
    const mobileContainer = document.getElementById("mobileChatList");
    if(mobileContainer) {
      mobileContainer.innerHTML = "";
      let groupItem = createChatListItem('group', null, localStorage.getItem("whispers_groupName"), groupMessages[groupMessages.length-1]?.text || "No messages");
      groupItem.addEventListener("click",()=>{ currentChat={type:'group',id:null}; showMobileChatView(); renderActiveChatMobile(); renderChatLists(); });
      mobileContainer.appendChild(groupItem);
      privateChats.forEach(chat=>{
        let item = createChatListItem('private', chat.userId, chat.name, chat.lastMessage || "Start chatting");
        item.addEventListener("click",()=>{ currentChat={type:'private', id:chat.userId}; showMobileChatView(); renderActiveChatMobile(); renderChatLists(); });
        mobileContainer.appendChild(item);
      });
    }
  }

  function createChatListItem(type, id, name, preview) {
    let div = document.createElement("div");
    div.className = "chat-list-item";
    div.dataset.type = type;
    div.dataset.id = id || "";
    div.innerHTML = `
      <div class="chat-avatar"><i class="${type==='group' ? 'fas fa-users' : 'fas fa-user'}"></i></div>
      <div class="chat-info">
        <div class="chat-name">${escapeHtml(name)}</div>
        <div class="chat-preview">${escapeHtml(preview.substring(0, 40))}</div>
      </div>
    `;
    return div;
  }

  function renderActiveChatDesktop() {
    renderDesktopHeader();
    renderDesktopMessages();
  }
  function renderActiveChatMobile() {
    renderMobileHeader();
    renderMobileMessages();
  }

  function renderMessagesCommon(container, messages) {
    container.innerHTML = "";
    messages.forEach(msg => {
      let row = document.createElement("div");
      row.className = `message-row ${msg.isSelf ? 'sent' : 'received'}`;
      let bubble = document.createElement("div"); bubble.className = "message-bubble";
      let senderSpan = document.createElement("div"); senderSpan.className = "sender-name";
      if(!msg.isSelf) senderSpan.innerHTML = `<i class="fas fa-user-circle"></i> ${escapeHtml(msg.sender)}`;
      else senderSpan.innerHTML = `<i class="fas fa-check-double"></i> You`;
      let textSpan = document.createElement("div"); textSpan.className = "message-text";
      let text = escapeHtml(msg.text);
      text = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
      textSpan.innerHTML = text;
      bubble.appendChild(senderSpan);
      bubble.appendChild(textSpan);
      if(msg.attachments && msg.attachments.length) {
        msg.attachments.forEach(att => {
          let attDiv = document.createElement("div"); attDiv.className = "attachment";
          if(att.type === 'image') attDiv.innerHTML = `<img src="${att.data}" style="max-width:100%; max-height:200px; border-radius:8px;">`;
          else if(att.type === 'video') attDiv.innerHTML = `<video controls src="${att.data}" style="max-width:100%; max-height:200px;"></video>`;
          else if(att.type === 'audio') attDiv.innerHTML = `<audio controls src="${att.data}"></audio>`;
          else if(att.type === 'document') attDiv.innerHTML = `<i class="fas fa-file-alt file-icon"></i> <a href="${att.data}" download="${att.name}">${att.name}</a>`;
          bubble.appendChild(attDiv);
        });
      }
      let timeSpan = document.createElement("div"); timeSpan.className = "message-time"; timeSpan.innerText = msg.timestamp;
      bubble.appendChild(timeSpan);
      row.appendChild(bubble);
      container.appendChild(row);
    });
    container.scrollTop = container.scrollHeight;
  }

  function renderDesktopMessages() {
    let container = document.getElementById("desktopChatMessages");
    let messages = currentChat.type==='group' ? groupMessages : (privateMessages[currentChat.id] || []);
    renderMessagesCommon(container, messages);
  }
  function renderMobileMessages() {
    let container = document.getElementById("mobileChatMessages");
    let messages = currentChat.type==='group' ? groupMessages : (privateMessages[currentChat.id] || []);
    renderMessagesCommon(container, messages);
  }

  function renderDesktopHeader() {
    let header = document.getElementById("desktopChatHeader");
    let title="", subtitle="";
    if(currentChat.type==='group') {
      title = localStorage.getItem("whispers_groupName");
      subtitle = `Group · ${groupMembers.length} members`;
    } else {
      let chat = privateChats.find(c=>c.userId===currentChat.id);
      title = chat ? chat.name : currentChat.id;
      subtitle = "Private chat";
    }
    header.innerHTML = `
      <div class="chat-title">
        <i class="${currentChat.type==='group' ? 'fas fa-users' : 'fas fa-user'}"></i>
        ${escapeHtml(title)}
        <span class="chat-subtitle">${subtitle}</span>
      </div>
      <div class="admin-controls">
        ${currentChat.type==='group' ? `
          <button class="btn-icon" id="desktopAddMemberBtn" title="Add Member"><i class="fas fa-user-plus"></i></button>
          <button class="btn-icon" id="desktopAdminLoginBtn"><i class="fas fa-user-shield"></i></button>
          <button class="btn-icon" id="desktopAdminLogoutBtn" style="display:${isGroupAdmin?'flex':'none'}"><i class="fas fa-sign-out-alt"></i></button>
          <button class="btn-icon" id="desktopThemeBtn" style="display:${isGroupAdmin?'flex':'none'}"><i class="fas fa-palette"></i></button>
        ` : ''}
      </div>
    `;
    if(currentChat.type==='group') {
      document.getElementById("desktopAddMemberBtn")?.addEventListener("click", showAddMemberModal);
      document.getElementById("desktopAdminLoginBtn")?.addEventListener("click", showAdminLogin);
      document.getElementById("desktopAdminLogoutBtn")?.addEventListener("click", adminLogout);
      document.getElementById("desktopThemeBtn")?.addEventListener("click", openThemeModal);
    }
  }

  function renderMobileHeader() {
    let titleDiv = document.getElementById("mobileChatTitle");
    let adminControls = document.getElementById("mobileAdminControls");
    let title="", subtitle="";
    if(currentChat.type==='group') {
      title = localStorage.getItem("whispers_groupName");
      subtitle = `Group · ${groupMembers.length} members`;
    } else {
      let chat = privateChats.find(c=>c.userId===currentChat.id);
      title = chat ? chat.name : currentChat.id;
      subtitle = "Private chat";
    }
    titleDiv.innerHTML = `<div><div class="chat-title" style="font-size:16px;">${escapeHtml(title)}</div><div class="chat-subtitle" style="font-size:10px;">${subtitle}</div></div>`;
    adminControls.innerHTML = currentChat.type==='group' ? `
      <button class="btn-icon" id="mobileAddMemberBtn" style="background:rgba(255,255,255,0.2);"><i class="fas fa-user-plus"></i></button>
      <button class="btn-icon" id="mobileAdminLoginBtn" style="background:rgba(255,255,255,0.2);"><i class="fas fa-user-shield"></i></button>
      <button class="btn-icon" id="mobileAdminLogoutBtn" style="display:${isGroupAdmin?'flex':'none'}; background:rgba(255,255,255,0.2);"><i class="fas fa-sign-out-alt"></i></button>
      <button class="btn-icon" id="mobileThemeBtn" style="display:${isGroupAdmin?'flex':'none'}; background:rgba(255,255,255,0.2);"><i class="fas fa-palette"></i></button>
    ` : '';
    if(currentChat.type==='group') {
      setTimeout(() => {
        document.getElementById("mobileAddMemberBtn")?.addEventListener("click", showAddMemberModal);
        document.getElementById("mobileAdminLoginBtn")?.addEventListener("click", showAdminLogin);
        document.getElementById("mobileAdminLogoutBtn")?.addEventListener("click", adminLogout);
        document.getElementById("mobileThemeBtn")?.addEventListener("click", openThemeModal);
      }, 100);
    }
  }

  // ---------- MESSAGING ----------
  function sendMessageWithAttachments(text, attachments, isMobileDevice) {
    if(!text.trim() && attachments.length===0) return;
    let msg = {
      id: Date.now(),
      text: text.trim(),
      sender: currentUser.displayName,
      isSelf: true,
      timestamp: new Date().toLocaleTimeString(),
      attachments: attachments
    };
    if(currentChat.type==='group') {
      groupMessages.push(msg);
      saveAll();
      if(isMobileDevice) renderMobileMessages(); else renderDesktopMessages();
    } else {
      if(!privateMessages[currentChat.id]) privateMessages[currentChat.id]=[];
      privateMessages[currentChat.id].push(msg);
      updatePrivateChatPreview(currentChat.id, text || (attachments[0]?.name || "Attachment"), msg.timestamp);
      if(isMobileDevice) renderMobileMessages(); else renderDesktopMessages();
    }
    let input = isMobileDevice ? document.getElementById("mobileMessageInput") : document.getElementById("desktopMessageInput");
    if(input) input.value = "";
    renderChatLists();
  }

  function attachFile(isMobileDevice) {
    let input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*,video/*,audio/*,application/pdf,.doc,.docx,.txt";
    input.onchange = e => {
      let file = e.target.files[0];
      if(!file) return;
      let reader = new FileReader();
      let attType = file.type.split('/')[0];
      if(attType === 'image') attType = 'image';
      else if(attType === 'video') attType = 'video';
      else if(attType === 'audio') attType = 'audio';
      else attType = 'document';
      reader.onload = ev => {
        let attachment = { type: attType, data: ev.target.result, name: file.name };
        sendMessageWithAttachments("", [attachment], isMobileDevice);
      };
      reader.readAsDataURL(file);
    };
    input.click();
  }

  // ---------- ADMIN & GROUP ----------
  function showAddMemberModal() { if(!isGroupAdmin) { alert("Only group admin can add members."); return; } document.getElementById("addMemberModal").style.display = "flex"; }
  function addGroupMember() {
    let name = document.getElementById("newMemberName").value.trim();
    if(!name) return;
    let id = name.toLowerCase().replace(/\s/g,'') + Date.now();
    groupMembers.push({ id, name });
    saveAll();
    addSystemNotification(`${name} joined the group!`, 'group');
    document.getElementById("addMemberModal").style.display = "none";
    document.getElementById("newMemberName").value = "";
    renderChatLists();
    if(!isMobile) renderDesktopHeader(); else renderMobileHeader();
  }
  function showAdminLogin() {
    let pwd = prompt("Enter admin password:");
    if(pwd === "admin123") {
      isGroupAdmin = true;
      localStorage.setItem("whispers_admin", "true");
      addSystemNotification("Admin mode activated.", 'group');
      if(!isMobile) renderDesktopHeader(); else renderMobileHeader();
    } else alert("Wrong password");
  }
  function adminLogout() { isGroupAdmin=false; localStorage.removeItem("whispers_admin"); addSystemNotification("Admin mode deactivated.", 'group'); if(!isMobile) renderDesktopHeader(); else renderMobileHeader(); }

  // ---------- AUTH & LOGOUT ----------
  function logout() {
    localStorage.removeItem("whispers_current_user");
    currentUser = null;
    isGroupAdmin = false;
    localStorage.removeItem("whispers_admin");
    document.getElementById("authModal").style.display = "flex";
  }

  function registerUser(username, password, displayName) {
    let users = JSON.parse(localStorage.getItem("whispers_users") || "{}");
    if(users[username]) return false;
    users[username] = { password, displayName };
    localStorage.setItem("whispers_users", JSON.stringify(users));
    return true;
  }
  function loginUser(username, password) {
    let users = JSON.parse(localStorage.getItem("whispers_users") || "{}");
    if(users[username] && users[username].password === password) {
      currentUser = { username, displayName: users[username].displayName };
      localStorage.setItem("whispers_current_user", JSON.stringify(currentUser));
      return true;
    }
    return false;
  }
  function federatedLogin(provider) {
    let fakeName = provider + "_" + Math.floor(Math.random()*10000);
    let display = provider.charAt(0).toUpperCase() + provider.slice(1) + " User";
    registerUser(fakeName, "federated", display);
    loginUser(fakeName, "federated");
    closeAuthModal();
    startApp();
  }
  function closeAuthModal() { document.getElementById("authModal").style.display = "none"; }
  function startApp() {
    loadData();
    loadTheme();
    if(localStorage.getItem("whispers_admin")==="true") isGroupAdmin=true;
    renderChatLists();
    if(isMobile) {
      document.getElementById("mobileListView").classList.add("list-view");
      document.getElementById("mobileChatView").classList.remove("active-chat");
      currentChat = { type: 'group', id: null };
      renderActiveChatMobile();
    } else {
      currentChat = { type: 'group', id: null };
      renderActiveChatDesktop();
    }
    // Set up event listeners
    document.getElementById("desktopSendBtn").onclick = () => sendMessageWithAttachments(document.getElementById("desktopMessageInput").value, [], false);
    document.getElementById("desktopAttachBtn").onclick = () => attachFile(false);
    document.getElementById("desktopMessageInput").addEventListener("keypress", e => { if(e.key==="Enter") sendMessageWithAttachments(e.target.value, [], false); });
    document.getElementById("mobileSendBtn").onclick = () => sendMessageWithAttachments(document.getElementById("mobileMessageInput").value, [], true);
    document.getElementById("mobileAttachBtn").onclick = () => attachFile(true);
    document.getElementById("mobileMessageInput").addEventListener("keypress", e => { if(e.key==="Enter") sendMessageWithAttachments(e.target.value, [], true); });
    document.getElementById("mobileBackBtn").onclick = () => showMobileListView();
    document.getElementById("desktopFabPlus").addEventListener("click", showNewChatModal);
    document.getElementById("mobileFabPlus").addEventListener("click", showNewChatModal);
    document.getElementById("desktopLogoutBtn").addEventListener("click", logout);
    document.getElementById("mobileLogoutBtn").addEventListener("click", logout);
  }

  function showMobileChatView() {
    document.getElementById("mobileListView").style.transform = "translateX(-100%)";
    document.getElementById("mobileChatView").style.transform = "translateX(0)";
  }
  function showMobileListView() {
    document.getElementById("mobileListView").style.transform = "translateX(0)";
    document.getElementById("mobileChatView").style.transform = "translateX(100%)";
  }

  // ---------- MODALS ----------
  function openThemeModal() { if(!isGroupAdmin) return; renderThemeModal(); document.getElementById("themeModal").style.display="flex"; }
  function renderThemeModal() {
    let container = document.getElementById("themeListContainer");
    container.innerHTML = "";
    for(let [id,t] of Object.entries(builtinThemes)) {
      let btn = document.createElement("div");
      btn.className = `theme-btn ${currentThemeId===id?'active':''}`;
      btn.innerHTML = `<span>${t.name}</span>`;
      btn.onclick = () => { applyThemeById(id); renderThemeModal(); addSystemNotification(`Theme: ${t.name}`,'group'); };
      container.appendChild(btn);
    }
    customThemes.forEach(c=>{
      let btn = document.createElement("div");
      btn.className = `theme-btn ${currentThemeId===c.id?'active':''}`;
      btn.innerHTML = `<span>🎨 ${c.name}</span><button class="delete-theme">🗑️</button>`;
      btn.onclick = (e) => { if(e.target.tagName!='BUTTON') applyThemeById(c.id); };
      btn.querySelector(".delete-theme").onclick = (e) => { e.stopPropagation(); customThemes=customThemes.filter(t=>t.id!==c.id); localStorage.setItem("whispers_custom_themes",JSON.stringify(customThemes)); if(currentThemeId===c.id) applyThemeById("light"); renderThemeModal(); };
      container.appendChild(btn);
    });
    let newBtn = document.createElement("div");
    newBtn.className = "theme-btn";
    newBtn.innerHTML = `<span>➕ Create Custom</span>`;
    newBtn.onclick = () => {
      let name = prompt("Theme name:");
      if(!name) return;
      let vars = {};
      for(let prop of ['--app-bg','--header-gradient-start','--header-gradient-end','--sent-bubble','--received-bubble','--input-area-bg','--send-btn-bg']) {
        let val = prompt(`Enter value for ${prop} (color or hex)`, getComputedStyle(document.documentElement).getPropertyValue(prop));
        if(val) vars[prop]=val;
      }
      let id = "custom_"+Date.now();
      customThemes.push({id,name,vars});
      localStorage.setItem("whispers_custom_themes",JSON.stringify(customThemes));
      applyThemeById(id);
      renderThemeModal();
    };
    container.appendChild(newBtn);
  }
  function showNewChatModal() {
    let members = groupMembers.filter(m => !privateChats.find(c=>c.userId===m.id));
    if(members.length===0) { alert("No new members to chat with."); return; }
    let list = document.createElement("div");
    members.forEach(m=>{
      let btn = document.createElement("div");
      btn.className = "theme-btn";
      btn.innerHTML = `<span>${m.name}</span>`;
      btn.onclick = () => {
        if(!privateChats.find(c=>c.userId===m.id)) {
          privateChats.push({ userId:m.id, name:m.name, lastMessage:"", lastTimestamp:"" });
          saveAll();
          renderChatLists();
        }
        currentChat = { type:'private', id:m.id };
        if(isMobile) { showMobileChatView(); renderActiveChatMobile(); } else renderActiveChatDesktop();
        renderChatLists();
        document.getElementById("newChatModal")?.remove();
      };
      list.appendChild(btn);
    });
    let modal = document.createElement("div");
    modal.className = "modal";
    modal.innerHTML = `<div class="modal-card"><h3>Start Private Chat</h3><div id="memberList"></div><button id="closeNewChat">Cancel</button></div>`;
    modal.querySelector("#memberList").appendChild(list);
    modal.querySelector("#closeNewChat").onclick = () => modal.remove();
    document.body.appendChild(modal);
    modal.style.display = "flex";
  }
  function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // ---------- INIT ----------
  function init() {
    const storedUser = localStorage.getItem("whispers_current_user");
    if(storedUser) {
      currentUser = JSON.parse(storedUser);
      closeAuthModal();
      startApp();
    } else {
      document.getElementById("authModal").style.display = "flex";
    }
  }
  // Auth modal event listeners
  document.getElementById("loginTab").onclick = () => { document.getElementById("loginPanel").style.display="block"; document.getElementById("signupPanel").style.display="none"; };
  document.getElementById("signupTab").onclick = () => { document.getElementById("loginPanel").style.display="none"; document.getElementById("signupPanel").style.display="block"; };
  document.getElementById("doLoginBtn").onclick = () => {
    let u = document.getElementById("loginUsername").value;
    let p = document.getElementById("loginPassword").value;
    if(loginUser(u,p)) { closeAuthModal(); startApp(); }
    else document.getElementById("authError").innerText = "Invalid credentials";
  };
  document.getElementById("doSignupBtn").onclick = () => {
    let u = document.getElementById("signupUsername").value;
    let p = document.getElementById("signupPassword").value;
    let d = document.getElementById("signupDisplayName").value;
    if(registerUser(u,p,d)) {
      loginUser(u,p);
      closeAuthModal();
      startApp();
    } else document.getElementById("authError").innerText = "Username exists";
  };
  document.getElementById("googleLoginBtn").onclick = () => federatedLogin("Google");
  document.getElementById("facebookLoginBtn").onclick = () => federatedLogin("Facebook");
  document.getElementById("confirmAddMemberBtn").onclick = addGroupMember;
  document.getElementById("closeAddMemberBtn").onclick = () => document.getElementById("addMemberModal").style.display="none";
  document.getElementById("closeThemeModal").onclick = () => document.getElementById("themeModal").style.display="none";
  document.getElementById("authModal").addEventListener("click", e=>{ if(e.target===document.getElementById("authModal")) closeAuthModal(); });
  document.getElementById("addMemberModal").addEventListener("click", e=>{ if(e.target===document.getElementById("addMemberModal")) document.getElementById("addMemberModal").style.display="none"; });
  document.getElementById("themeModal").addEventListener("click", e=>{ if(e.target===document.getElementById("themeModal")) document.getElementById("themeModal").style.display="none"; });
  window.addEventListener("resize", () => {
    isMobile = window.innerWidth <= 768;
    if(isMobile) {
      document.getElementById("mobileListView").style.transform = "translateX(0)";
      document.getElementById("mobileChatView").style.transform = "translateX(100%)";
    } else {
      renderActiveChatDesktop();
    }
  });
  init();
</script>
</body>
</html>
