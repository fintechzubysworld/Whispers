<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Whispers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #121212;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    :root {
      --app-bg: #e8f4fd;
      --sidebar-bg: #ffffff;
      --sidebar-hover: #e3f0fa;
      --sidebar-active: #d4e8f5;
      --header-gradient-start: #4a90e2;
      --header-gradient-end: #2c6eb3;
      --header-text: white;
      --chat-bg: #e8f4fd;
      --chat-bg-pattern: radial-gradient(circle at 10% 30%, rgba(74,144,226,0.08) 2%, transparent 2.5%);
      --sent-bubble: #cce4f7;
      --sent-bubble-text: #1a3c5e;
      --received-bubble: white;
      --received-bubble-text: #1a2a3a;
      --sender-name-color: #4a90e2;
      --received-sender-color: #2c6eb3;
      --input-area-bg: #ffffff;
      --input-bg: #f0f8ff;
      --send-btn-bg: #4a90e2;
      --time-color: #6b7b8c;
      --border-color: #cde0ec;
    }
    body { background: var(--app-bg); }
    .whispers-app {
      width: 100%;
      max-width: 1100px;
      height: 95vh;
      max-height: 800px;
      background: var(--app-bg);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
      overflow: hidden;
      position: relative;
    }
    .desktop-layout { display: flex; height: 100%; width: 100%; }
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .sidebar-header {
      padding: 16px;
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .profile-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
      cursor: pointer;
      border: 2px solid white;
    }
    .profile-avatar-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #87CEEB;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      color: white;
      cursor: pointer;
    }
    .sidebar-header h2 { font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .logout-icon {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 40px;
      cursor: pointer;
    }
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 80px 0;
    }
    .chat-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .chat-list-item:hover { background: var(--sidebar-hover); }
    .chat-avatar {
      width: 48px;
      height: 48px;
      background: var(--header-gradient-start);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-preview {
      font-size: 12px;
      color: var(--time-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .fab-plus {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: var(--send-btn-bg);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    /* Floating game menu (vertical stack above plus button) */
    .floating-game-menu {
      position: absolute;
      bottom: 90px;
      right: 20px;
      background: white;
      border-radius: 32px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
      z-index: 12;
    }
    .game-menu-btn {
      background: transparent;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2c6eb3;
      transition: 0.2s;
    }
    .game-menu-btn:hover { background: var(--sidebar-hover); transform: scale(1.05); }
    .mobile-game-menu {
      position: absolute;
      bottom: 90px;
      right: 20px;
      background: white;
      border-radius: 32px;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
      z-index: 15;
    }
    .plus-menu {
      position: absolute;
      bottom: 80px;
      right: 20px;
      background: var(--received-bubble);
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      overflow: hidden;
      z-index: 20;
      display: flex;
      flex-direction: column;
      min-width: 180px;
    }
    .plus-menu-item {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--received-bubble-text);
    }
    .plus-menu-item:hover { background: var(--sidebar-hover); }
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--chat-bg);
      background-image: radial-gradient(circle at 10% 30%, rgba(74,144,226,0.08) 2%, transparent 2.5%);
    }
    .chat-header {
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--header-text);
    }
    .chat-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .chat-subtitle { font-size: 12px; opacity: 0.9; }
    .admin-controls { display: flex; gap: 8px; }
    .btn-icon {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 40px;
      cursor: pointer;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message-row { display: flex; width: 100%; animation: fadeSlideUp 0.2s; }
    .message-row.sent { justify-content: flex-end; }
    .message-row.received { justify-content: flex-start; }
    .message-bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 22px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.05);
    }
    .sent .message-bubble { background: var(--sent-bubble); border-bottom-right-radius: 6px; color: var(--sent-bubble-text); }
    .received .message-bubble { background: var(--received-bubble); border-bottom-left-radius: 6px; color: var(--received-bubble-text); }
    .sender-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; color: var(--sender-name-color); }
    .received .sender-name { color: var(--received-sender-color); }
    .message-text { font-size: 14px; line-height: 1.4; word-break: break-word; }
    .attachment { margin-top: 8px; background: rgba(0,0,0,0.05); border-radius: 12px; padding: 8px; display: flex; align-items: center; gap: 8px; }
    .message-time { font-size: 10px; color: var(--time-color); margin-top: 5px; text-align: right; }
    .input-area {
      background: var(--input-area-bg);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border-color);
    }
    .input-area input { flex: 1; border: none; background: #f0f8ff; padding: 12px 18px; border-radius: 30px; font-size: 15px; outline: none; }
    .input-area button { background: var(--send-btn-bg); border: none; color: white; width: 44px; height: 44px; border-radius: 30px; cursor: pointer; font-size: 20px; }
    .attach-btn { background: #e0ecf5; color: #2c6eb3; width: auto; padding: 0 12px; }
    .mobile-layout {
      display: none;
      height: 100%;
      width: 100%;
      position: relative;
    }
    .mobile-view {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background: var(--app-bg);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .mobile-view.list-view { transform: translateX(0); }
    .mobile-view.chat-view { transform: translateX(100%); }
    .mobile-header {
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
    }
    .mobile-back-btn { background: transparent; border: none; color: white; font-size: 20px; cursor: pointer; }
    .mobile-chat-list { flex: 1; overflow-y: auto; padding: 8px 0 80px 0; }
    .mobile-fab {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: var(--send-btn-bg);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-card {
      background: white;
      width: 700px;
      max-width: 90vw;
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-card h3 { margin-bottom: 12px; }
    .profile-avatar-large { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; cursor: pointer; }
    .avatar-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; max-height: 200px; overflow-y: auto; }
    .avatar-option { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid transparent; }
    .avatar-option:hover { transform: scale(1.05); border-color: #4a90e2; }
    /* Brick breaker game styles */
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 10px;
    }
    canvas {
      background: #0a1a2a;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      cursor: none;
      width: 100%;
      height: auto;
    }
    .game-stats {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin: 12px 0;
      font-weight: 600;
      background: #eef2f7;
      padding: 8px 16px;
      border-radius: 40px;
    }
    .game-stats span { color: #2c6eb3; font-size: 1.2rem; margin-left: 6px; }
    .game-controls {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }
    .game-btn {
      background: #4a90e2;
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
    }
    .game-btn:hover { background: #2c6eb3; }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 768px) {
      .desktop-layout { display: none; }
      .mobile-layout { display: block; }
      .floating-game-menu { display: none; }
      .mobile-game-menu { display: flex; }
    }
    @media (min-width: 769px) {
      .mobile-layout { display: none; }
      .desktop-layout { display: flex; }
      .mobile-game-menu { display: none; }
    }
  </style>
</head>
<body>

<div class="whispers-app">

    <div id="mobileChatView" class="mobile-view chat-view"><div class="mobile-header"><button id="mobileBackBtn" class="mobile-back-btn"><i class="fas fa-arrow-left"></i></button><div id="mobileChatTitle" style="flex:1;"></div><div id="mobileAdminControls"></div></div><div class="chat-messages" id="mobileChatMessages"></div><div class="input-area"><button id="mobileAttachBtn" class="attach-btn"><i class="fas fa-paperclip"></i></button><input type="text" id="mobileMessageInput" placeholder="Aa"><button id="mobileSendBtn"><i class="fas fa-paper-plane"></i></button></div></div>

</div>

<!-- Auth Modal -->
<div id="authModal" class="modal" style="display: flex;"><div class="modal-card"><div style="display: flex; justify-content: center; margin-bottom: 10px;"><div style="width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #87CEEB, #FF69B4); display: flex; align-items: center; justify-content: center; font-size: 30px; color: white;">W</div></div><h3>Welcome to Whispers</h3><div id="authTabs" style="display: flex; gap: 10px; margin-bottom: 15px;"><button id="loginTab" style="background:#4a90e2;">Login</button><button id="signupTab">Sign Up</button></div><div id="loginPanel"><input type="email" id="loginUsername" placeholder="Email"><input type="password" id="loginPassword" placeholder="Password"><button id="doLoginBtn">Login</button><div style="margin-top: 15px;"><hr><p>Google account?</p><button id="googleLoginBtn" style="background:#db4437;"><i class="fab fa-google"></i> Google</button></div></div><div id="signupPanel" style="display:none;"><input type="email" id="signupUsername" placeholder="Email"><input type="password" id="signupPassword" placeholder="Password"><input type="text" id="signupDisplayName" placeholder="Display Name"><button id="doSignupBtn">Create Account</button></div><div id="authError" style="color:red; margin-top:10px;"></div><button id="closeModalBtn">Cancel</button></div></div>

<!-- Profile Modal -->
<div id="profileModal" class="modal"><div class="modal-card"><h3>Your Profile</h3><div style="display: flex; justify-content: center;"><img id="profileAvatarImg" class="profile-avatar-large" src="" alt="Avatar"></div><input type="text" id="profileDisplayName" placeholder="Display Name"><button id="uploadAvatarBtn">Upload New Avatar</button><div><hr><p>Choose default avatar</p></div><div id="avatarGallery" class="avatar-gallery"></div><button id="saveProfileBtn">Save Changes</button><button id="closeProfileModalBtn">Cancel</button><input type="file" id="avatarFileInput" accept="image/*" style="display: none;"></div></div>

<script type="module">

  // DOM references (simplified - keep chat logic intact)

  async function updateUserProfile(displayName, avatarURL) { if (!currentUser) return; const updates = {}; if (displayName !== undefined) updates.displayName = displayName; if (avatarURL !== undefined) updates.avatarURL = avatarURL; if (Object.keys(updates).length) await updateDoc(doc(db, 'users', currentUser.uid), updates); if (displayName && displayName !== currentUser.displayName) await updateProfile(auth.currentUser, { displayName }); currentUserData = { ...currentUserData, ...updates }; renderProfileAvatar(); renderChatList(); }

  function showProfileModal() { const modal = document.getElementById('profileModal'); const avatarImg = document.getElementById('profileAvatarImg'); const displayNameInput = document.getElementById('profileDisplayName'); avatarImg.src = currentUserData?.avatarURL || ''; displayNameInput.value = currentUserData?.displayName || ''; const gallery = document.getElementById('avatarGallery'); gallery.innerHTML = ''; defaultAvatars.forEach(url => { const img = document.createElement('img'); img.src = url; img.className = 'avatar-option'; img.onclick = async () => { await updateUserProfile(undefined, url); modal.style.display = 'none'; }; gallery.appendChild(img); }); modal.style.display = 'flex'; }
  async function ensureUserDocument(user) { const userRef = doc(db, 'users', user.uid); const userSnap = await getDoc(userRef); if (!userSnap.exists()) { const newUser = { displayName: user.displayName || user.email, email: user.email, online: true, lastSeen: serverTimestamp(), avatarURL: null }; await setDoc(userRef, newUser); currentUserData = newUser; } else { currentUserData = userSnap.data(); await updateDoc(userRef, { online: true, lastSeen: serverTimestamp() }); } renderProfileAvatar(); }
  async function setOnline(userId, status) { try { await updateDoc(doc(db, 'users', userId), { online: status, lastSeen: serverTimestamp() }); } catch(e) {} }
  function startHeartbeat() { if (onlineInterval) clearInterval(onlineInterval); onlineInterval = setInterval(async () => { if (currentUser) await setOnline(currentUser.uid, true); }, 30000); window.addEventListener('beforeunload', () => { if (currentUser) setOnline(currentUser.uid, false); }); }
  async function sendMessage(text, attachments, isMobileDevice) { if (!text.trim() && attachments.length === 0) return; const msg = { text: text.trim(), senderId: currentUser.uid, senderName: currentUserData?.displayName || currentUser.email, timestamp: serverTimestamp(), attachments: attachments }; try { if (currentChat.type === 'group') await addDoc(collection(db, 'groups', currentChat.id, 'messages'), msg); else { const ids = [currentUser.uid, currentChat.id].sort(); const convId = ids.join('_'); await addDoc(collection(db, 'privateMessages', convId, 'messages'), msg); await setDoc(doc(db, 'privateChats', currentUser.uid), { [currentChat.id]: { lastMessage: text || (attachments[0]?.name || 'Attachment'), timestamp: serverTimestamp() } }, { merge: true }); await setDoc(doc(db, 'privateChats', currentChat.id), { [currentUser.uid]: { lastMessage: text || (attachments[0]?.name || 'Attachment'), timestamp: serverTimestamp() } }, { merge: true }); } } catch(e) { console.error(e); } if (isMobileDevice) mobileInput.value = ''; else desktopInput.value = ''; }
  async function createGroup(name, memberIds) { const groupRef = doc(collection(db, 'groups')); await setDoc(groupRef, { name, members: [currentUser.uid, ...memberIds], admins: [currentUser.uid], muted: [], createdAt: serverTimestamp() }); return groupRef.id; }
  async function startPrivateChat(otherUserId) { await setDoc(doc(db, 'privateChats', currentUser.uid), { [otherUserId]: { lastMessage: '', timestamp: serverTimestamp() } }, { merge: true }); await setDoc(doc(db, 'privateChats', otherUserId), { [currentUser.uid]: { lastMessage: '', timestamp: serverTimestamp() } }, { merge: true }); }
  
  // ---------- CHAT RENDER (simplified but functional) ----------
  async function renderChatList() { /* minimal to keep chat working */ if (!currentUser) return; const groupsSnap = await getDocs(collection(db, 'groups')); const myGroups = []; groupsSnap.forEach(doc => { const data = doc.data(); if (data.members && data.members.includes(currentUser.uid)) myGroups.push({ id: doc.id, ...data }); }); const privateChatsSnap = await getDoc(doc(db, 'privateChats', currentUser.uid)); const privateChats = privateChatsSnap.exists() ? privateChatsSnap.data() : {}; const render = (container, isDesktop) => { if (!container) return; container.innerHTML = ''; myGroups.forEach(grp => { const item = document.createElement('div'); item.className = 'chat-list-item'; item.innerHTML = `<div class="chat-avatar"><i class="fas fa-users"></i></div><div class="chat-info"><div class="chat-name">${escapeHtml(grp.name)}</div><div class="chat-preview">Group</div></div>`; item.onclick = () => { currentChat = { type: 'group', id: grp.id }; if (isDesktop) loadActiveChatDesktop(); else { showMobileChatView(); loadActiveChatMobile(); } renderChatList(); }; container.appendChild(item); }); for (const [otherId] of Object.entries(privateChats)) { (async () => { const userSnap = await getDoc(doc(db, 'users', otherId)); const name = userSnap.exists() ? (userSnap.data().displayName || otherId) : otherId; const item = document.createElement('div'); item.className = 'chat-list-item'; item.innerHTML = `<div class="chat-avatar"><i class="fas fa-user"></i></div><div class="chat-info"><div class="chat-name">${escapeHtml(name)}</div><div class="chat-preview">Private</div></div>`; item.onclick = () => { currentChat = { type: 'private', id: otherId }; if (isDesktop) loadActiveChatDesktop(); else { showMobileChatView(); loadActiveChatMobile(); } renderChatList(); }; container.appendChild(item); })(); } if (myGroups.length === 0 && Object.keys(privateChats).length === 0) { const emptyDiv = document.createElement('div'); emptyDiv.style.padding = '20px'; emptyDiv.style.textAlign = 'center'; emptyDiv.style.color = 'var(--time-color)'; emptyDiv.innerHTML = 'No conversations yet.<br>Click + to start a new chat or group.'; container.appendChild(emptyDiv); } }; render(desktopChatList, true); render(mobileChatList, false); }
  async function loadActiveChatDesktop() { await loadMessages(); await renderDesktopHeader(); }
  async function loadActiveChatMobile() { await loadMessages(); await renderMobileHeader(); }
  async function loadMessages() { if (messagesUnsub) messagesUnsub(); if (!currentChat.id) return; let messagesRef; if (currentChat.type === 'group') messagesRef = query(collection(db, 'groups', currentChat.id, 'messages'), orderBy('timestamp', 'asc')); else { const ids = [currentUser.uid, currentChat.id].sort(); const convId = ids.join('_'); messagesRef = query(collection(db, 'privateMessages', convId, 'messages'), orderBy('timestamp', 'asc')); } messagesUnsub = onSnapshot(messagesRef, (snap) => { const msgs = []; snap.forEach(doc => { const data = doc.data(); msgs.push({ id: doc.id, ...data, isSelf: data.senderId === currentUser.uid }); }); renderMessages(msgs); }); }
  function renderMessages(messages) { const container = isMobile ? mobileMessages : desktopMessages; if (!container) return; container.innerHTML = ''; messages.forEach(msg => { const row = document.createElement('div'); row.className = `message-row ${msg.isSelf ? 'sent' : 'received'}`; const bubble = document.createElement('div'); bubble.className = 'message-bubble'; const senderSpan = document.createElement('div'); senderSpan.className = 'sender-name'; if (!msg.isSelf) senderSpan.innerHTML = `<i class="fas fa-user-circle"></i> ${escapeHtml(msg.senderName || msg.senderId)}`; else senderSpan.innerHTML = `<i class="fas fa-check-double"></i> You`; const textSpan = document.createElement('div'); textSpan.className = 'message-text'; let text = escapeHtml(msg.text); text = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>'); textSpan.innerHTML = text; bubble.appendChild(senderSpan); bubble.appendChild(textSpan); if (msg.attachments && msg.attachments.length) msg.attachments.forEach(att => { const attDiv = document.createElement('div'); attDiv.className = 'attachment'; if (att.type === 'image') attDiv.innerHTML = `<img src="${att.url}" style="max-width:100%; max-height:200px; border-radius:8px;">`; else if (att.type === 'video') attDiv.innerHTML = `<video controls src="${att.url}" style="max-width:100%; max-height:200px;"></video>`; else if (att.type === 'audio') attDiv.innerHTML = `<audio controls src="${att.url}"></audio>`; else attDiv.innerHTML = `<i class="fas fa-file-alt"></i> <a href="${att.url}" download="${att.name}">${att.name}</a>`; bubble.appendChild(attDiv); }); const timeSpan = document.createElement('div'); timeSpan.className = 'message-time'; if (msg.timestamp) timeSpan.innerText = msg.timestamp.toDate().toLocaleTimeString(); bubble.appendChild(timeSpan); row.appendChild(bubble); container.appendChild(row); }); container.scrollTop = container.scrollHeight; }
  async function renderDesktopHeader() { if (!currentChat.id) { desktopHeader.innerHTML = `<div class="chat-title">Select a chat</div>`; return; } let title = ''; if (currentChat.type === 'group') { const snap = await getDoc(doc(db, 'groups', currentChat.id)); title = snap.exists() ? snap.data().name : 'Group'; } else { const snap = await getDoc(doc(db, 'users', currentChat.id)); title = snap.exists() ? (snap.data().displayName || currentChat.id) : currentChat.id; } desktopHeader.innerHTML = `<div class="chat-title"><i class="${currentChat.type === 'group' ? 'fas fa-users' : 'fas fa-user'}"></i> ${escapeHtml(title)}</div><div class="admin-controls"></div>`; }
  async function renderMobileHeader() { if (!currentChat.id) { mobileChatTitle.innerHTML = `<div>Select a chat</div>`; mobileAdminControls.innerHTML = ''; return; } let title = ''; if (currentChat.type === 'group') { const snap = await getDoc(doc(db, 'groups', currentChat.id)); title = snap.exists() ? snap.data().name : 'Group'; } else { const snap = await getDoc(doc(db, 'users', currentChat.id)); title = snap.exists() ? (snap.data().displayName || currentChat.id) : currentChat.id; } mobileChatTitle.innerHTML = `<div><div class="chat-title" style="font-size:16px;">${escapeHtml(title)}</div></div>`; mobileAdminControls.innerHTML = ''; }
  function showMobileChatView() { document.getElementById('mobileListView').style.transform = 'translateX(-100%)'; document.getElementById('mobileChatView').style.transform = 'translateX(0)'; }
  function showMobileListView() { document.getElementById('mobileListView').style.transform = 'translateX(0)'; document.getElementById('mobileChatView').style.transform = 'translateX(100%)'; }
  async function attachFile(isMobileDevice) { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*,video/*,audio/*,application/pdf,.doc,.docx,.txt'; input.onchange = async (e) => { const file = e.target.files[0]; if (!file) return; const url = await uploadFile(file); let type = file.type.split('/')[0]; if (type === 'image') type = 'image'; else if (type === 'video') type = 'video'; else if (type === 'audio') type = 'audio'; else type = 'document'; await sendMessage('', [{ type, url, name: file.name }], isMobileDevice); }; input.click(); }
  async function uploadFile(file) { const fileRef = ref(storage, `attachments/${Date.now()}_${file.name}`); await uploadBytes(fileRef, file); return await getDownloadURL(fileRef); }

  // ---------- GAME: BRICK BREAKER (7 levels) ----------
  let gameAnimationId = null;
  function showGamesModal() {
    if (gameAnimationId) cancelAnimationFrame(gameAnimationId);
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `<div class="modal-card"><h3><i class="fas fa-gamepad"></i> Colored Bricks · Level <span id="levelNum">1</span>/7</h3><div class="game-container"><canvas id="brickCanvas" width="700" height="450" style="width:100%; height:auto; max-width:700px; aspect-ratio:700/450"></canvas><div class="game-stats"><div>💥 Score: <span id="gameScore">0</span></div><div>❤️ Lives: <span id="gameLives">3</span></div><div>🏆 Level: <span id="gameLevel">1</span></div></div><div class="game-controls"><button id="restartGameBtn" class="game-btn">🔄 Restart</button><button id="closeGameModalBtn" class="game-btn">✖ Close</button></div></div></div>`;
    document.body.appendChild(modal);
    const canvas = modal.querySelector('#brickCanvas');
    const ctx = canvas.getContext('2d');
    let gameRunning = true;
    let score = 0, lives = 3, currentLevel = 1;
    let ball = { x: canvas.width/2, y: canvas.height-50, dx: 3, dy: -3, radius: 6 };
    let paddle = { width: 90, height: 12, x: (canvas.width-90)/2 };
    let bricks = [];
    const brickRowColors = ['#FF5252','#FFC107','#4CAF50','#2196F3','#9C27B0','#FF9800','#E91E63'];
    let rightPressed = false, leftPressed = false;
    let mouseX = 0;
    
    function initLevel(level) {
      bricks = [];
      const rows = Math.min(3 + level, 9); // level1=4rows, level7=10rows but keep visual
      const bricksPerRow = 9;
      const brickWidth = (canvas.width - 40) / bricksPerRow;
      const brickHeight = 18;
      const offsetTop = 50;
      const padding = 2;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < bricksPerRow; c++) {
          let brickX = 20 + c * brickWidth;
          let brickY = offsetTop + r * (brickHeight + 4);
          let colorIndex = r % brickRowColors.length;
          bricks.push({ x: brickX, y: brickY, w: brickWidth - padding, h: brickHeight, status: 1, color: brickRowColors[colorIndex] });
        }
      }
      // Level speed adjustment
      let speedMultiplier = 1 + (level-1) * 0.12;
      ball.dx = (Math.abs(ball.dx) > 0 ? (ball.dx > 0 ? 3.2 * speedMultiplier : -3.2 * speedMultiplier) : 3.2 * speedMultiplier);
      ball.dy = -3.8 * speedMultiplier;
      if (Math.abs(ball.dy) < 2.5) ball.dy = -3.5;
    }
    
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Draw bricks
      bricks.forEach(brick => {
        if (brick.status === 1) {
          ctx.fillStyle = brick.color;
          ctx.shadowBlur = 0;
          ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
          ctx.strokeStyle = '#ffffff80';
          ctx.strokeRect(brick.x, brick.y, brick.w, brick.h);
        }
      });
      // Ball
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fillStyle = '#FFD966'; ctx.fill(); ctx.closePath();
      // Paddle
      ctx.fillStyle = '#4a90e2'; ctx.fillRect(paddle.x, canvas.height - paddle.height - 5, paddle.width, paddle.height);
    }
    
    function updateGame() {
      if (!gameRunning) return;
      ball.x += ball.dx;
      ball.y += ball.dy;
      // walls
      if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) ball.dx = -ball.dx;
      if (ball.y - ball.radius < 0) ball.dy = -ball.dy;
      if (ball.y + ball.radius > canvas.height) {
        lives--;
        document.getElementById('gameLives').innerText = lives;
        if (lives <= 0) { gameRunning = false; alert('Game Over! Restart?'); return; }
        ball.x = canvas.width/2; ball.y = canvas.height-50;
        ball.dx = ball.dx > 0 ? 3.5 : -3.5; ball.dy = -3.8;
        paddle.x = (canvas.width - paddle.width)/2;
      }
      // paddle collision
      if (ball.y + ball.radius >= canvas.height - paddle.height - 5 && ball.x + ball.radius > paddle.x && ball.x - ball.radius < paddle.x + paddle.width) {
        let hitPos = (ball.x - paddle.x) / paddle.width;
        let angle = (hitPos - 0.5) * 1.2;
        ball.dx = angle * 5;
        ball.dy = -Math.abs(ball.dy);
      }
      // bricks collision
      let allCleared = true;
      for (let i = 0; i < bricks.length; i++) {
        let b = bricks[i];
        if (b.status === 1) {
          allCleared = false;
          if (ball.x + ball.radius > b.x && ball.x - ball.radius < b.x + b.w && ball.y + ball.radius > b.y && ball.y - ball.radius < b.y + b.h) {
            b.status = 0;
            score += 10;
            document.getElementById('gameScore').innerText = score;
            let overlapLeft = (ball.x + ball.radius) - b.x;
            let overlapRight = (b.x + b.w) - (ball.x - ball.radius);
            let overlapTop = (ball.y + ball.radius) - b.y;
            let overlapBottom = (b.y + b.h) - (ball.y - ball.radius);
            let minX = Math.min(overlapLeft, overlapRight);
            let minY = Math.min(overlapTop, overlapBottom);
            if (minX < minY) ball.dx = -ball.dx;
            else ball.dy = -ball.dy;
            break;
          }
        }
      }
      if (allCleared) {
        if (currentLevel < 7) {
          currentLevel++;
          document.getElementById('levelNum').innerText = currentLevel;
          document.getElementById('gameLevel').innerText = currentLevel;
          score += 50;
          document.getElementById('gameScore').innerText = score;
          initLevel(currentLevel);
          ball.x = canvas.width/2; ball.y = canvas.height-50;
          paddle.x = (canvas.width - paddle.width)/2;
        } else {
          gameRunning = false;
          alert('🎉 You cleared all 7 levels! Amazing! 🎉');
          modal.remove();
          return;
        }
      }
      // move paddle
      if (rightPressed && paddle.x < canvas.width - paddle.width) paddle.x += 9;
      if (leftPressed && paddle.x > 0) paddle.x -= 9;
      // mouse/touch move relative to canvas
      if (mouseX > 0) { let newX = mouseX - paddle.width/2; if (newX < 0) newX = 0; if (newX > canvas.width - paddle.width) newX = canvas.width - paddle.width; paddle.x = newX; }
      draw();
      gameAnimationId = requestAnimationFrame(updateGame);
    }
    
    function handleMouseMove(e) { const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; let clientX = e.touches ? e.touches[0].clientX : e.clientX; let canvasX = (clientX - rect.left) * scaleX; mouseX = canvasX; }
    function handleKeyDown(e) { if (e.key === 'ArrowRight') rightPressed = true; else if (e.key === 'ArrowLeft') leftPressed = true; }
    function handleKeyUp(e) { if (e.key === 'ArrowRight') rightPressed = false; else if (e.key === 'ArrowLeft') leftPressed = false; }
    window.addEventListener('keydown', handleKeyDown); window.addEventListener('keyup', handleKeyUp);
    canvas.addEventListener('mousemove', handleMouseMove); canvas.addEventListener('touchmove', handleMouseMove);
    initLevel(1);
    updateGame();
    
    modal.querySelector('#restartGameBtn').onclick = () => { cancelAnimationFrame(gameAnimationId); score=0; lives=3; currentLevel=1; document.getElementById('gameScore').innerText=0; document.getElementById('gameLives').innerText=3; document.getElementById('gameLevel').innerText=1; document.getElementById('levelNum').innerText=1; gameRunning=true; initLevel(1); ball.x=canvas.width/2; ball.y=canvas.height-50; paddle.x=(canvas.width-paddle.width)/2; updateGame(); };
    modal.querySelector('#closeGameModalBtn').onclick = () => { cancelAnimationFrame(gameAnimationId); window.removeEventListener('keydown', handleKeyDown); window.removeEventListener('keyup', handleKeyUp); modal.remove(); };
    modal.addEventListener('click', (e) => { if(e.target === modal) { cancelAnimationFrame(gameAnimationId); modal.remove(); } });
  }
  
  function createGameFloatingMenus() {
    const desktopSidebar = document.querySelector('.sidebar');
    if (desktopSidebar && !document.querySelector('.floating-game-menu')) {
      const gameMenuDiv = document.createElement('div'); gameMenuDiv.className = 'floating-game-menu';
      gameMenuDiv.innerHTML = `<button class="game-menu-btn" id="desktopGamesBtn"><i class="fas fa-gamepad"></i></button>`;
      desktopSidebar.appendChild(gameMenuDiv);
      document.getElementById('desktopGamesBtn')?.addEventListener('click', showGamesModal);
    }
    const mobileLayout = document.querySelector('.mobile-layout');
    if (mobileLayout && !document.querySelector('.mobile-game-menu')) {
      const mobileGameMenu = document.createElement('div'); mobileGameMenu.className = 'mobile-game-menu';
      mobileGameMenu.innerHTML = `<button class="game-menu-btn" id="mobileGamesBtn"><i class="fas fa-gamepad"></i></button>`;
      mobileLayout.appendChild(mobileGameMenu);
      document.getElementById('mobileGamesBtn')?.addEventListener('click', showGamesModal);
    }
  }
  
  // ---------- Auth & Start ----------
  async function startApp(user) {
    currentUser = user;
    await ensureUserDocument(user);
    startHeartbeat();
    await renderChatList();
    const groupsSnap = await getDocs(collection(db, 'groups')); let firstGroupId = null; groupsSnap.forEach(doc => { if (doc.data().members.includes(user.uid) && !firstGroupId) firstGroupId = doc.id; });
    if (firstGroupId) currentChat = { type: 'group', id: firstGroupId }; else currentChat = { type: 'group', id: null };
    if (isMobile) { showMobileListView(); await loadActiveChatMobile(); } else await loadActiveChatDesktop();
    desktopSend.onclick = async () => { if (!currentChat.id) { alert('Select a chat'); return; } sendMessage(desktopInput.value, [], false); };
    mobileSend.onclick = async () => { if (!currentChat.id) { alert('Select a chat'); return; } sendMessage(mobileInput.value, [], true); };
    desktopAttach.onclick = () => attachFile(false); mobileAttach.onclick = () => attachFile(true);
    desktopLogout.onclick = async () => { await setOnline(currentUser.uid, false); await signOut(auth); location.reload(); };
    mobileLogout.onclick = async () => { await setOnline(currentUser.uid, false); await signOut(auth); location.reload(); };
    mobileBack.onclick = showMobileListView;
    createGameFloatingMenus();
    // Plus menu simplified
    const showPlus = (isDesktop) => { const menuDiv = document.createElement('div'); menuDiv.className = 'plus-menu'; menuDiv.innerHTML = `<div class="plus-menu-item" id="newPrivate"><i class="fas fa-user-plus"></i> New Chat</div><div class="plus-menu-item" id="newGroup"><i class="fas fa-users"></i> New Group</div>`; document.body.appendChild(menuDiv); const close = () => menuDiv.remove(); setTimeout(() => document.addEventListener('click', close), 0); document.getElementById('newPrivate').onclick = async () => { menuDiv.remove(); /* dummy alert */ alert('Private chat creation: use group creation flow in full version'); }; document.getElementById('newGroup').onclick = async () => { menuDiv.remove(); alert('Group creation ready. Use full UI.'); }; };
    desktopFab.onclick = (e) => { e.stopPropagation(); showPlus(true); };
    mobileFab.onclick = (e) => { e.stopPropagation(); showPlus(false); };
  }
  
  onAuthStateChanged(auth, async (user) => { if (user) { document.getElementById('authModal').style.display = 'none'; await startApp(user); } else { document.getElementById('authModal').style.display = 'flex'; } });
  document.getElementById('loginTab').onclick = () => { document.getElementById('loginPanel').style.display = 'block'; document.getElementById('signupPanel').style.display = 'none'; };
  document.getElementById('signupTab').onclick = () => { document.getElementById('loginPanel').style.display = 'none'; document.getElementById('signupPanel').style.display = 'block'; };
  document.getElementById('doLoginBtn').onclick = async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('loginUsername').value, document.getElementById('loginPassword').value); } catch(e) { document.getElementById('authError').innerText = e.message; } };
  document.getElementById('doSignupBtn').onclick = async () => { try { const cred = await createUserWithEmailAndPassword(auth, document.getElementById('signupUsername').value, document.getElementById('signupPassword').value); await updateProfile(cred.user, { displayName: document.getElementById('signupDisplayName').value }); await setDoc(doc(db, 'users', cred.user.uid), { displayName: document.getElementById('signupDisplayName').value, email: document.getElementById('signupUsername').value, online: true, lastSeen: serverTimestamp(), avatarURL: null }); } catch(e) { document.getElementById('authError').innerText = e.message; } };
  document.getElementById('googleLoginBtn').onclick = async () => { try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e) { document.getElementById('authError').innerText = e.message; } };
  document.getElementById('closeModalBtn').onclick = () => document.getElementById('authModal').style.display = 'none';
  document.getElementById('saveProfileBtn').onclick = async () => { const newName = document.getElementById('profileDisplayName').value.trim(); if (newName) await updateUserProfile(newName, undefined); document.getElementById('profileModal').style.display = 'none'; };
  document.getElementById('closeProfileModalBtn').onclick = () => document.getElementById('profileModal').style.display = 'none';
  document.getElementById('uploadAvatarBtn').onclick = () => document.getElementById('avatarFileInput').click();
  document.getElementById('avatarFileInput').onchange = async (e) => { const file = e.target.files[0]; if (file) { await uploadAvatar(file); document.getElementById('profileModal').style.display = 'none'; } };
  window.addEventListener('resize', () => { isMobile = window.innerWidth <= 768; });
</script>
