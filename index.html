<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Whispers · Email Auth Only · All Features Working</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ========== FULL STYLES (same as before) ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #121212;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    :root {
      --app-bg: #e8f4fd;
      --sidebar-bg: #ffffff;
      --sidebar-hover: #e3f0fa;
      --sidebar-active: #d4e8f5;
      --header-gradient-start: #4a90e2;
      --header-gradient-end: #2c6eb3;
      --header-text: white;
      --chat-bg: #e8f4fd;
      --chat-bg-pattern: radial-gradient(circle at 10% 30%, rgba(74,144,226,0.08) 2%, transparent 2.5%);
      --sent-bubble: #cce4f7;
      --sent-bubble-text: #1a3c5e;
      --received-bubble: white;
      --received-bubble-text: #1a2a3a;
      --sender-name-color: #4a90e2;
      --received-sender-color: #2c6eb3;
      --input-area-bg: #ffffff;
      --input-bg: #f0f8ff;
      --input-border-focus: #4a90e2;
      --send-btn-bg: #4a90e2;
      --send-btn-hover: #2c6eb3;
      --simulate-btn-bg: #e0ecf5;
      --simulate-btn-text: #2c6eb3;
      --time-color: #6b7b8c;
      --border-color: #cde0ec;
    }
    body { background: var(--app-bg); }
    .whispers-app {
      width: 100%;
      max-width: 1100px;
      height: 95vh;
      max-height: 800px;
      background: var(--app-bg);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
      overflow: hidden;
      position: relative;
    }
    .desktop-layout { display: flex; height: 100%; width: 100%; }
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .sidebar-header {
      padding: 16px;
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header h2 { font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .logout-icon {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 40px;
      cursor: pointer;
    }
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 80px 0;
    }
    .chat-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .chat-list-item:hover { background: var(--sidebar-hover); }
    .chat-list-item.active {
      background: var(--sidebar-active);
      border-left-color: var(--header-gradient-start);
    }
    .chat-avatar {
      width: 48px;
      height: 48px;
      background: var(--header-gradient-start);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-preview {
      font-size: 12px;
      color: var(--time-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .fab-plus {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: var(--send-btn-bg);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .plus-menu {
      position: absolute;
      bottom: 80px;
      right: 20px;
      background: var(--received-bubble);
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      overflow: hidden;
      z-index: 20;
      display: flex;
      flex-direction: column;
      min-width: 180px;
    }
    .plus-menu-item {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--received-bubble-text);
    }
    .plus-menu-item:hover { background: var(--sidebar-hover); }
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--chat-bg);
      background-image: var(--chat-bg-pattern);
    }
    .chat-header {
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--header-text);
    }
    .chat-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .chat-subtitle { font-size: 12px; opacity: 0.9; }
    .admin-controls { display: flex; gap: 8px; }
    .btn-icon {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 40px;
      cursor: pointer;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message-row { display: flex; width: 100%; animation: fadeSlideUp 0.2s; }
    .message-row.sent { justify-content: flex-end; }
    .message-row.received { justify-content: flex-start; }
    .message-bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 22px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.05);
    }
    .sent .message-bubble {
      background: var(--sent-bubble);
      border-bottom-right-radius: 6px;
      color: var(--sent-bubble-text);
    }
    .received .message-bubble {
      background: var(--received-bubble);
      border-bottom-left-radius: 6px;
      color: var(--received-bubble-text);
    }
    .sender-name {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--sender-name-color);
    }
    .received .sender-name { color: var(--received-sender-color); }
    .message-text { font-size: 14px; line-height: 1.4; word-break: break-word; }
    .message-text a { color: #4a90e2; text-decoration: none; }
    .attachment {
      margin-top: 8px;
      background: rgba(0,0,0,0.05);
      border-radius: 12px;
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .attachment img, .attachment video, .attachment audio {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
    }
    .message-time {
      font-size: 10px;
      color: var(--time-color);
      margin-top: 5px;
      text-align: right;
    }
    .input-area {
      background: var(--input-area-bg);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border-color);
    }
    .input-area input {
      flex: 1;
      border: none;
      background: var(--input-bg);
      padding: 12px 18px;
      border-radius: 30px;
      font-size: 15px;
      outline: none;
    }
    .input-area button {
      background: var(--send-btn-bg);
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 20px;
    }
    .attach-btn {
      background: var(--simulate-btn-bg);
      color: var(--simulate-btn-text);
      width: auto;
      padding: 0 12px;
    }
    .mobile-layout {
      display: none;
      height: 100%;
      width: 100%;
      position: relative;
    }
    .mobile-view {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background: var(--app-bg);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .mobile-view.list-view { transform: translateX(0); }
    .mobile-view.chat-view { transform: translateX(100%); }
    .mobile-header {
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
    }
    .mobile-back-btn {
      background: transparent;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
    .mobile-chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 80px 0;
    }
    .mobile-fab {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: var(--send-btn-bg);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-card {
      background: white;
      width: 340px;
      max-width: 90vw;
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-card h3 { margin-bottom: 12px; }
    .modal-card input, .modal-card textarea {
      width: 100%;
      margin: 8px 0;
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }
    .modal-card button {
      background: #4a90e2;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      margin: 5px;
      cursor: pointer;
    }
    .member-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-bottom: 1px solid #eee;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 768px) {
      .desktop-layout { display: none; }
      .mobile-layout { display: block; }
    }
    @media (min-width: 769px) {
      .mobile-layout { display: none; }
      .desktop-layout { display: flex; }
    }
  </style>
</head>
<body>

<div class="whispers-app">
  <!-- Desktop Layout -->
  <div class="desktop-layout">
    <div class="sidebar">
      <div class="sidebar-header">

  <div class="mobile-layout">

<!-- Auth Modal (Email/Password only) -->
<div id="authModal" class="modal" style="display: flex;">
  <div class="modal-card">
    <i class="fab fa-whatsapp" style="font-size: 40px; color:#4a90e2;"></i>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, query, orderBy, serverTimestamp, setDoc, getDoc, arrayUnion, arrayRemove, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAmgvzZju_GbPdUDDHqFg4AN54xnJ4LwW8",
    authDomain: "whispers-4d04e.firebaseapp.com",
    projectId: "whispers-4d04e",
    storageBucket: "whispers-4d04e.firebasestorage.app",
    messagingSenderId: "32971948813",
    appId: "1:32971948813:web:3ea4e8a242c055a7e52644",
    measurementId: "G-K4N3XEBZKK"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // ---------- Global State ----------
  let currentUser = null;
  let currentChat = { type: 'group', id: 'main' };
  let typingTimeout = null;
  let onlineInterval = null;
  let isMobile = window.innerWidth <= 768;
  let messagesUnsub = null;
  let typingUnsub = null;

  // DOM Elements
  const desktopChatList = document.getElementById('desktopChatList');
  const mobileChatList = document.getElementById('mobileChatList');
  const desktopMessages = document.getElementById('desktopChatMessages');
  const mobileMessages = document.getElementById('mobileChatMessages');
  const desktopHeader = document.getElementById('desktopChatHeader');
  const mobileChatTitle = document.getElementById('mobileChatTitle');
  const mobileAdminControls = document.getElementById('mobileAdminControls');
  const desktopFab = document.getElementById('desktopFabPlus');
  const mobileFab = document.getElementById('mobileFabPlus');
  const desktopSend = document.getElementById('desktopSendBtn');
  const mobileSend = document.getElementById('mobileSendBtn');
  const desktopInput = document.getElementById('desktopMessageInput');
  const mobileInput = document.getElementById('mobileMessageInput');
  const desktopAttach = document.getElementById('desktopAttachBtn');
  const mobileAttach = document.getElementById('mobileAttachBtn');
  const mobileBack = document.getElementById('mobileBackBtn');
  const desktopLogout = document.getElementById('desktopLogoutBtn');
  const mobileLogout = document.getElementById('mobileLogoutBtn');

  function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  // ---------- User & Online ----------
  async function ensureUserDocument(user) {
    const userRef = doc(db, 'users', user.uid);
    const userSnap = await getDoc(userRef);
    if (!userSnap.exists()) {
      await setDoc(userRef, { displayName: user.displayName || user.email, email: user.email, online: true, lastSeen: serverTimestamp() });
    } else {
      await updateDoc(userRef, { online: true, lastSeen: serverTimestamp() });
    }
  }
  async function setOnline(userId, status) {
    try { await updateDoc(doc(db, 'users', userId), { online: status, lastSeen: serverTimestamp() }); } catch(e) { console.warn(e); }
  }
  function startHeartbeat() {
    if (onlineInterval) clearInterval(onlineInterval);
    onlineInterval = setInterval(async () => { if (currentUser) await setOnline(currentUser.uid, true); }, 30000);
    window.addEventListener('beforeunload', () => { if (currentUser) setOnline(currentUser.uid, false); });
  }

  // ---------- Typing ----------
  async function setTyping(chatType, chatId, isTyping) {
    if (!currentUser) return;
    const typingRef = doc(db, 'typingIndicators', `${chatType}_${chatId}`);
    try {
      if (isTyping) await setDoc(typingRef, { [currentUser.uid]: true, updatedAt: serverTimestamp() }, { merge: true });
      else await updateDoc(typingRef, { [currentUser.uid]: false });
    } catch(e) { console.warn(e); }
  }
  function listenTyping(chatType, chatId, callback) {
    const ref = doc(db, 'typingIndicators', `${chatType}_${chatId}`);
    return onSnapshot(ref, (snap) => {
      if (snap.exists()) {
        const data = snap.data();
        const typingUsers = Object.keys(data).filter(k => k !== 'updatedAt' && data[k] === true && k !== currentUser?.uid);
        callback(typingUsers);
      } else callback([]);
    }, (err) => console.error(err));
  }

  // ---------- File Upload ----------
  async function uploadFile(file) {
    const fileRef = ref(storage, `attachments/${Date.now()}_${file.name}`);
    await uploadBytes(fileRef, file);
    return await getDownloadURL(fileRef);
  }

  // ---------- Send Message ----------
  async function sendMessage(text, attachments, isMobileDevice) {
    if (!text.trim() && attachments.length === 0) return;
    const msg = {
      text: text.trim(),
      senderId: currentUser.uid,
      senderName: currentUser.displayName || currentUser.email,
      timestamp: serverTimestamp(),
      attachments: attachments
    };
    try {
      if (currentChat.type === 'group') {
        const groupId = currentChat.id === 'main' ? 'main' : currentChat.id;
        await addDoc(collection(db, 'groups', groupId, 'messages'), msg);
      } else {
        const ids = [currentUser.uid, currentChat.id].sort();
        const convId = ids.join('_');
        await addDoc(collection(db, 'privateMessages', convId, 'messages'), msg);
        await setDoc(doc(db, 'privateChats', currentUser.uid), { [currentChat.id]: { lastMessage: text || (attachments[0]?.name || 'Attachment'), timestamp: serverTimestamp() } }, { merge: true });
        await setDoc(doc(db, 'privateChats', currentChat.id), { [currentUser.uid]: { lastMessage: text || (attachments[0]?.name || 'Attachment'), timestamp: serverTimestamp() } }, { merge: true });
      }
    } catch(e) { console.error(e); }
    if (isMobileDevice) mobileInput.value = '';
    else desktopInput.value = '';
  }

  // ---------- Group Utils ----------
  async function isMuted(groupId, userId) {
    try {
      const snap = await getDoc(doc(db, 'groups', groupId));
      return snap.exists() ? (snap.data().muted || []).includes(userId) : false;
    } catch(e) { return false; }
  }
  async function kickMember(groupId, userId) { await updateDoc(doc(db, 'groups', groupId), { members: arrayRemove(userId), muted: arrayRemove(userId) }); }
  async function toggleMute(groupId, userId, mute) {
    if (mute) await updateDoc(doc(db, 'groups', groupId), { muted: arrayUnion(userId) });
    else await updateDoc(doc(db, 'groups', groupId), { muted: arrayRemove(userId) });
  }
  async function createGroup(name, memberIds) {
    const groupRef = doc(collection(db, 'groups'));
    await setDoc(groupRef, { name, members: [currentUser.uid, ...memberIds], admins: [currentUser.uid], muted: [], createdAt: serverTimestamp() });
    return groupRef.id;
  }
  async function startPrivateChat(otherUserId) {
    await setDoc(doc(db, 'privateChats', currentUser.uid), { [otherUserId]: { lastMessage: '', timestamp: serverTimestamp() } }, { merge: true });
    await setDoc(doc(db, 'privateChats', otherUserId), { [currentUser.uid]: { lastMessage: '', timestamp: serverTimestamp() } }, { merge: true });
  }

  // ---------- Render Chat List ----------
  async function renderChatList() {
    if (!currentUser) return;
    try {
      const groupsSnap = await getDocs(collection(db, 'groups'));
      const myGroups = [];
      groupsSnap.forEach(doc => { const data = doc.data(); if (data.members && data.members.includes(currentUser.uid)) myGroups.push({ id: doc.id, ...data }); });
      const privateChatsSnap = await getDoc(doc(db, 'privateChats', currentUser.uid));
      const privateChats = privateChatsSnap.exists() ? privateChatsSnap.data() : {};

      const render = (container, isDesktop) => {
        if (!container) return;
        container.innerHTML = '';
        const mainItem = createChatItem('group', 'main', 'Whispers Squad', '');
        mainItem.onclick = () => { currentChat = { type: 'group', id: 'main' }; if (isDesktop) loadActiveChatDesktop(); else { showMobileChatView(); loadActiveChatMobile(); } renderChatList(); };
        container.appendChild(mainItem);
        for (const grp of myGroups) {
          const item = createChatItem('group', grp.id, grp.name, '');
          item.onclick = () => { currentChat = { type: 'group', id: grp.id }; if (isDesktop) loadActiveChatDesktop(); else { showMobileChatView(); loadActiveChatMobile(); } renderChatList(); };
          container.appendChild(item);
        }
        for (const [otherId, data] of Object.entries(privateChats)) {
          (async () => {
            const userSnap = await getDoc(doc(db, 'users', otherId));
            const name = userSnap.exists() ? (userSnap.data().displayName || otherId) : otherId;
            const item = createChatItem('private', otherId, name, data.lastMessage || '');
            item.onclick = () => { currentChat = { type: 'private', id: otherId }; if (isDesktop) loadActiveChatDesktop(); else { showMobileChatView(); loadActiveChatMobile(); } renderChatList(); };
            container.appendChild(item);
          })();
        }
      };
      render(desktopChatList, true);
      render(mobileChatList, false);
    } catch(e) { console.error(e); }
  }

  function createChatItem(type, id, name, preview) {
    const div = document.createElement('div');
    div.className = 'chat-list-item';
    div.dataset.type = type;
    div.dataset.id = id;
    const icon = type === 'group' ? 'fas fa-users' : 'fas fa-user';
    div.innerHTML = `<div class="chat-avatar"><i class="${icon}"></i></div><div class="chat-info"><div class="chat-name">${escapeHtml(name)}</div><div class="chat-preview">${escapeHtml(preview.substring(0,40))}</div></div>`;
    return div;
  }

  // ---------- Active Chat ----------
  async function loadActiveChatDesktop() { await renderDesktopHeader(); await loadMessages(); }
  async function loadActiveChatMobile() { await renderMobileHeader(); await loadMessages(); }

  async function loadMessages() {
    if (messagesUnsub) messagesUnsub();
    let messagesRef;
    if (currentChat.type === 'group') {
      const groupId = currentChat.id === 'main' ? 'main' : currentChat.id;
      messagesRef = query(collection(db, 'groups', groupId, 'messages'), orderBy('timestamp', 'asc'));
    } else {
      const ids = [currentUser.uid, currentChat.id].sort();
      const convId = ids.join('_');
      messagesRef = query(collection(db, 'privateMessages', convId, 'messages'), orderBy('timestamp', 'asc'));
    }
    messagesUnsub = onSnapshot(messagesRef, (snap) => {
      const msgs = [];
      snap.forEach(doc => { const data = doc.data(); msgs.push({ id: doc.id, ...data, isSelf: data.senderId === currentUser.uid }); });
      renderMessages(msgs);
    }, (err) => console.error(err));
    if (typingUnsub) typingUnsub();
    const typingId = currentChat.type === 'group' ? (currentChat.id === 'main' ? 'main' : currentChat.id) : `private_${currentChat.id}`;
    typingUnsub = listenTyping(currentChat.type, typingId, (users) => {
      const typingDiv = document.getElementById('typingIndicator');
      if (typingDiv) typingDiv.innerText = users.length ? `${users.length} ${users.length === 1 ? 'person is' : 'people are'} typing...` : '';
    });
  }

  function renderMessages(messages) {
    const container = isMobile ? mobileMessages : desktopMessages;
    if (!container) return;
    container.innerHTML = '';
    messages.forEach(msg => {
      const row = document.createElement('div');
      row.className = `message-row ${msg.isSelf ? 'sent' : 'received'}`;
      const bubble = document.createElement('div'); bubble.className = 'message-bubble';
      const senderSpan = document.createElement('div'); senderSpan.className = 'sender-name';
      if (!msg.isSelf) senderSpan.innerHTML = `<i class="fas fa-user-circle"></i> ${escapeHtml(msg.senderName || msg.senderId)}`;
      else senderSpan.innerHTML = `<i class="fas fa-check-double"></i> You`;
      const textSpan = document.createElement('div'); textSpan.className = 'message-text';
      let text = escapeHtml(msg.text);
      text = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
      textSpan.innerHTML = text;
      bubble.appendChild(senderSpan);
      bubble.appendChild(textSpan);
      if (msg.attachments && msg.attachments.length) {
        msg.attachments.forEach(att => {
          const attDiv = document.createElement('div'); attDiv.className = 'attachment';
          if (att.type === 'image') attDiv.innerHTML = `<img src="${att.url}" style="max-width:100%; max-height:200px; border-radius:8px;">`;
          else if (att.type === 'video') attDiv.innerHTML = `<video controls src="${att.url}" style="max-width:100%; max-height:200px;"></video>`;
          else if (att.type === 'audio') attDiv.innerHTML = `<audio controls src="${att.url}"></audio>`;
          else if (att.type === 'document') attDiv.innerHTML = `<i class="fas fa-file-alt file-icon"></i> <a href="${att.url}" download="${att.name}">${att.name}</a>`;
          bubble.appendChild(attDiv);
        });
      }
      const timeSpan = document.createElement('div'); timeSpan.className = 'message-time';
      if (msg.timestamp) timeSpan.innerText = msg.timestamp.toDate().toLocaleTimeString();
      bubble.appendChild(timeSpan);
      row.appendChild(bubble);
      container.appendChild(row);
    });
    container.scrollTop = container.scrollHeight;
    if (!document.getElementById('typingIndicator')) {
      const tip = document.createElement('div');
      tip.id = 'typingIndicator';
      tip.style.fontSize = '12px';
      tip.style.color = 'var(--time-color)';
      tip.style.padding = '4px 14px';
      container.appendChild(tip);
    }
  }

  async function renderDesktopHeader() {
    let title = '';
    if (currentChat.type === 'group') {
      if (currentChat.id === 'main') title = 'Whispers Squad';
      else { const snap = await getDoc(doc(db, 'groups', currentChat.id)); title = snap.exists() ? snap.data().name : 'Group'; }
    } else {
      const snap = await getDoc(doc(db, 'users', currentChat.id));
      title = snap.exists() ? (snap.data().displayName || currentChat.id) : currentChat.id;
    }
    desktopHeader.innerHTML = `
      <div class="chat-title"><i class="${currentChat.type === 'group' ? 'fas fa-users' : 'fas fa-user'}"></i> ${escapeHtml(title)} <span class="chat-subtitle">${currentChat.type === 'group' ? 'Group Chat' : 'Private Chat'}</span></div>
      <div class="admin-controls">${currentChat.type === 'group' ? `<button class="btn-icon" id="desktopManageBtn"><i class="fas fa-cog"></i></button>` : ''}</div>
    `;
    if (currentChat.type === 'group') {
      const btn = document.getElementById('desktopManageBtn');
      if (btn) btn.onclick = () => showGroupManageModal(currentChat.id);
    }
  }

  async function renderMobileHeader() {
    let title = '';
    if (currentChat.type === 'group') {
      if (currentChat.id === 'main') title = 'Whispers Squad';
      else { const snap = await getDoc(doc(db, 'groups', currentChat.id)); title = snap.exists() ? snap.data().name : 'Group'; }
    } else {
      const snap = await getDoc(doc(db, 'users', currentChat.id));
      title = snap.exists() ? (snap.data().displayName || currentChat.id) : currentChat.id;
    }
    mobileChatTitle.innerHTML = `<div><div class="chat-title" style="font-size:16px;">${escapeHtml(title)}</div><div class="chat-subtitle" style="font-size:10px;">${currentChat.type === 'group' ? 'Group Chat' : 'Private Chat'}</div></div>`;
    mobileAdminControls.innerHTML = currentChat.type === 'group' ? `<button class="btn-icon" id="mobileManageBtn" style="background:rgba(255,255,255,0.2);"><i class="fas fa-cog"></i></button>` : '';
    if (currentChat.type === 'group') {
      const btn = document.getElementById('mobileManageBtn');
      if (btn) btn.onclick = () => showGroupManageModal(currentChat.id);
    }
  }

  async function showGroupManageModal(groupId) {
    try {
      const groupSnap = await getDoc(doc(db, 'groups', groupId));
      if (!groupSnap.exists()) return;
      const data = groupSnap.data();
      const members = data.members || [];
      const muted = data.muted || [];
      const memberList = [];
      for (const uid of members) {
        const userSnap = await getDoc(doc(db, 'users', uid));
        memberList.push({ uid, name: userSnap.exists() ? (userSnap.data().displayName || uid) : uid, isMuted: muted.includes(uid) });
      }
      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.innerHTML = `<div class="modal-card"><h3>Manage Group</h3><div id="memberListDiv"></div><button id="closeGroupModalBtn">Close</button></div>`;
      const listDiv = modal.querySelector('#memberListDiv');
      for (const m of memberList) {
        const row = document.createElement('div');
        row.style.display = 'flex'; row.style.justifyContent = 'space-between'; row.style.alignItems = 'center';
        row.style.padding = '8px'; row.style.borderBottom = '1px solid #eee';
        row.innerHTML = `<span>${escapeHtml(m.name)} ${m.isMuted ? '(Muted)' : ''}</span>
          <div><button class="kickBtn" data-uid="${m.uid}" style="background:#e74c3c; color:white; border:none; border-radius:20px; padding:4px 8px; margin:0 4px; cursor:pointer;">Kick</button>
          <button class="muteBtn" data-uid="${m.uid}" style="background:#f39c12; color:white; border:none; border-radius:20px; padding:4px 8px; cursor:pointer;">${m.isMuted ? 'Unmute' : 'Mute'}</button></div>`;
        row.querySelector('.kickBtn').onclick = async () => { if (confirm(`Kick ${m.name}?`)) { await kickMember(groupId, m.uid); modal.remove(); } };
        row.querySelector('.muteBtn').onclick = async () => { await toggleMute(groupId, m.uid, !m.isMuted); modal.remove(); };
        listDiv.appendChild(row);
      }
      modal.querySelector('#closeGroupModalBtn').onclick = () => modal.remove();
      document.body.appendChild(modal);
      modal.style.display = 'flex';
    } catch(e) { console.error(e); }
  }

  // ---------- Plus Menu ----------
  let activeMenu = null;
  function showPlusMenu(isDesktop) {
    if (activeMenu) activeMenu.remove();
    const menu = document.createElement('div');
    menu.className = 'plus-menu';
    menu.innerHTML = `
      <div class="plus-menu-item" id="menuNewPrivate"><i class="fas fa-user-plus"></i> New Private Chat</div>
      <div class="plus-menu-item" id="menuNewGroup"><i class="fas fa-users"></i> Start New Group</div>
      <div class="plus-menu-item" id="menuCreateFile"><i class="fas fa-file-alt"></i> Create Text File</div>
    `;
    const fab = isDesktop ? desktopFab : mobileFab;
    fab.parentNode.appendChild(menu);
    activeMenu = menu;
    const close = (e) => { if (activeMenu && !activeMenu.contains(e.target) && e.target !== fab) { activeMenu.remove(); activeMenu = null; document.removeEventListener('click', close); } };
    setTimeout(() => document.addEventListener('click', close), 0);
    document.getElementById('menuNewPrivate').onclick = () => { activeMenu?.remove(); activeMenu = null; showNewPrivateChatModal(); };
    document.getElementById('menuNewGroup').onclick = () => { activeMenu?.remove(); activeMenu = null; showNewGroupModal(); };
    document.getElementById('menuCreateFile').onclick = () => { activeMenu?.remove(); activeMenu = null; showCreateFileModal(); };
  }

  async function showNewPrivateChatModal() {
    const usersSnap = await getDocs(collection(db, 'users'));
    const users = [];
    usersSnap.forEach(doc => { if (doc.id !== currentUser.uid) users.push({ id: doc.id, name: doc.data().displayName || doc.id }); });
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<div class="modal-card"><h3>Start Private Chat</h3><div id="userList"></div><button id="cancelPrivateBtn">Cancel</button></div>`;
    const listDiv = modal.querySelector('#userList');
    users.forEach(u => {
      const btn = document.createElement('div');
      btn.className = 'theme-btn';
      btn.style.margin = '4px'; btn.style.padding = '8px'; btn.style.cursor = 'pointer';
      btn.innerHTML = `<span>${escapeHtml(u.name)}</span>`;
      btn.onclick = async () => {
        await startPrivateChat(u.id);
        currentChat = { type: 'private', id: u.id };
        if (isMobile) { showMobileChatView(); await loadActiveChatMobile(); } else await loadActiveChatDesktop();
        renderChatList();
        modal.remove();
      };
      listDiv.appendChild(btn);
    });
    modal.querySelector('#cancelPrivateBtn').onclick = () => modal.remove();
    document.body.appendChild(modal);
    modal.style.display = 'flex';
  }

  async function showNewGroupModal() {
    const usersSnap = await getDocs(collection(db, 'users'));
    const users = [];
    usersSnap.forEach(doc => { if (doc.id !== currentUser.uid) users.push({ id: doc.id, name: doc.data().displayName || doc.id }); });
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<div class="modal-card"><h3>Create New Group</h3><input type="text" id="groupName" placeholder="Group Name"><div id="membersList"></div><button id="createGroupBtn">Create</button><button id="cancelGroupBtn">Cancel</button></div>`;
    const membersDiv = modal.querySelector('#membersList');
    users.forEach(u => {
      const div = document.createElement('div');
      div.className = 'member-checkbox';
      div.innerHTML = `<input type="checkbox" value="${u.id}" id="member_${u.id}"> <label for="member_${u.id}">${escapeHtml(u.name)}</label>`;
      membersDiv.appendChild(div);
    });
    modal.querySelector('#createGroupBtn').onclick = async () => {
      const name = modal.querySelector('#groupName').value.trim();
      if (!name) { alert('Enter group name'); return; }
      const selected = [];
      modal.querySelectorAll('input:checked').forEach(cb => selected.push(cb.value));
      const groupId = await createGroup(name, selected);
      currentChat = { type: 'group', id: groupId };
      if (isMobile) { showMobileChatView(); await loadActiveChatMobile(); } else await loadActiveChatDesktop();
      renderChatList();
      modal.remove();
    };
    modal.querySelector('#cancelGroupBtn').onclick = () => modal.remove();
    document.body.appendChild(modal);
    modal.style.display = 'flex';
  }

  function showCreateFileModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<div class="modal-card"><h3>Create Text File</h3><input type="text" id="fileName" placeholder="Filename.txt" value="document.txt"><textarea id="fileContent" rows="5" placeholder="File content..."></textarea><button id="createFileBtn">Create & Send</button><button id="cancelFileBtn">Cancel</button></div>`;
    modal.querySelector('#createFileBtn').onclick = async () => {
      let filename = modal.querySelector('#fileName').value.trim() || 'document.txt';
      const content = modal.querySelector('#fileContent').value;
      const blob = new Blob([content], { type: 'text/plain' });
      const url = await uploadFile(new File([blob], filename));
      await sendMessage('', [{ type: 'document', url, name: filename }], isMobile);
      modal.remove();
    };
    modal.querySelector('#cancelFileBtn').onclick = () => modal.remove();
    document.body.appendChild(modal);
    modal.style.display = 'flex';
  }

  function onInputChange(isMobileDevice) {
    if (typingTimeout) clearTimeout(typingTimeout);
    const chatId = currentChat.type === 'group' ? (currentChat.id === 'main' ? 'main' : currentChat.id) : `private_${currentChat.id}`;
    setTyping(currentChat.type, chatId, true);
    typingTimeout = setTimeout(() => { setTyping(currentChat.type, chatId, false); }, 1500);
  }

  function showMobileChatView() {
    document.getElementById('mobileListView').style.transform = 'translateX(-100%)';
    document.getElementById('mobileChatView').style.transform = 'translateX(0)';
  }
  function showMobileListView() {
    document.getElementById('mobileListView').style.transform = 'translateX(0)';
    document.getElementById('mobileChatView').style.transform = 'translateX(100%)';
  }

  async function attachFile(isMobileDevice) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*,video/*,audio/*,application/pdf,.doc,.docx,.txt';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const url = await uploadFile(file);
      let type = file.type.split('/')[0];
      if (type === 'image') type = 'image';
      else if (type === 'video') type = 'video';
      else if (type === 'audio') type = 'audio';
      else type = 'document';
      await sendMessage('', [{ type, url, name: file.name }], isMobileDevice);
    };
    input.click();
  }

  // ---------- Auth & Init ----------
  async function startApp(user) {
    currentUser = user;
    await ensureUserDocument(user);
    startHeartbeat();
    const mainGroup = doc(db, 'groups', 'main');
    const mainSnap = await getDoc(mainGroup);
    if (!mainSnap.exists()) await setDoc(mainGroup, { name: 'Whispers Squad', members: [user.uid], muted: [], createdAt: serverTimestamp() });
    else if (!mainSnap.data().members.includes(user.uid)) await updateDoc(mainGroup, { members: arrayUnion(user.uid) });
    await renderChatList();
    currentChat = { type: 'group', id: 'main' };
    if (isMobile) { showMobileListView(); await loadActiveChatMobile(); } else await loadActiveChatDesktop();

    // Attach all button handlers (ensuring they are not lost)
    desktopSend.onclick = async () => {
      if (currentChat.type === 'group' && await isMuted(currentChat.id === 'main' ? 'main' : currentChat.id, currentUser.uid)) { alert('You are muted in this group.'); return; }
      sendMessage(desktopInput.value, [], false);
    };
    mobileSend.onclick = async () => {
      if (currentChat.type === 'group' && await isMuted(currentChat.id === 'main' ? 'main' : currentChat.id, currentUser.uid)) { alert('You are muted in this group.'); return; }
      sendMessage(mobileInput.value, [], true);
    };
    desktopAttach.onclick = () => attachFile(false);
    mobileAttach.onclick = () => attachFile(true);
    desktopInput.oninput = () => onInputChange(false);
    mobileInput.oninput = () => onInputChange(true);
    desktopLogout.onclick = async () => { await setOnline(currentUser.uid, false); await signOut(auth); location.reload(); };
    mobileLogout.onclick = async () => { await setOnline(currentUser.uid, false); await signOut(auth); location.reload(); };
    desktopFab.onclick = (e) => { e.stopPropagation(); showPlusMenu(true); };
    mobileFab.onclick = (e) => { e.stopPropagation(); showPlusMenu(false); };
    mobileBack.onclick = showMobileListView;
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) { document.getElementById('authModal').style.display = 'none'; await startApp(user); }
    else { document.getElementById('authModal').style.display = 'flex'; }
  });

  // Auth UI Handlers (email/password only)
  document.getElementById('loginTab').onclick = () => { document.getElementById('loginPanel').style.display = 'block'; document.getElementById('signupPanel').style.display = 'none'; };
  document.getElementById('signupTab').onclick = () => { document.getElementById('loginPanel').style.display = 'none'; document.getElementById('signupPanel').style.display = 'block'; };
  document.getElementById('doLoginBtn').onclick = async () => {
    const email = document.getElementById('loginUsername').value;
    const pwd = document.getElementById('loginPassword').value;
    try { await signInWithEmailAndPassword(auth, email, pwd); } catch (err) { document.getElementById('authError').innerText = err.message; }
  };
  document.getElementById('doSignupBtn').onclick = async () => {
    const email = document.getElementById('signupUsername').value;
    const pwd = document.getElementById('signupPassword').value;
    const name = document.getElementById('signupDisplayName').value;
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pwd);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, 'users', cred.user.uid), { displayName: name, email, online: true, lastSeen: serverTimestamp() });
    } catch (err) { document.getElementById('authError').innerText = err.message; }
  };
  document.getElementById('closeModalBtn').onclick = () => document.getElementById('authModal').style.display = 'none';
  window.addEventListener('resize', () => {
    isMobile = window.innerWidth <= 768;
    if (!isMobile && currentChat) loadActiveChatDesktop();
  });
</script>
</body>
</html>
